spring.application.name=finance-tracker-complete

# MongoDB Atlas Connection
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/finance-tracker}
spring.data.mongodb.database=finance-tracker

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# Server
server.port=${PORT:8080}

# Email Configuration (for reports)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER}
spring.mail.password=${EMAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Session
server.servlet.session.timeout=30d
server.servlet.session.tracking-modes=cookie