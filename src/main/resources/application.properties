spring.application.name=finance-tracker
logging.level.root=WARN

# MongoDB - values will be injected from EnvConfig
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE}
spring.data.mongodb.authentication-database=admin
spring.data.mongodb.auto-index-creation=true

# MongoDB connection tuning
spring.data.mongodb.socket.connect-timeout=5000
spring.data.mongodb.socket.read-timeout=5000
spring.data.mongodb.connection-pool.max-size=20
spring.data.mongodb.connection-pool.min-size=4
spring.data.mongodb.connection-pool.max-wait-time=2000
spring.data.mongodb.connection-pool.max-connection-idle-time=60000
spring.data.mongodb.connection-pool.max-connection-life-time=300000

# Thymeleaf (enable caching for production speed)
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.render.template-markers=false

# Server
server.address=0.0.0.0
server.port=${SERVER_PORT:8080}
server.error.whitelabel.enabled=false
server.error.path=/error

# Load DispatcherServlet at startup (faster first request)
spring.mvc.servlet.load-on-startup=1

# Static resources caching (aggressive caching for speed)
spring.web.resources.cache.period=86400
spring.web.resources.chain.cache=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**/*.{js,css,png,jpg,jpeg,gif,ico,svg}

# Performance optimizations
spring.output.ansi.enabled=never
spring.jmx.enabled=false
spring.main.lazy-initialization=false

# Server compression for faster page loads
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json,image/svg+xml
server.compression.min-response-size=1024

# Async request timeout (10s for report generation)
spring.mvc.async.request-timeout=10000

app.maintenance=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Session (5 min inactivity timeout)
server.servlet.session.timeout=5m