<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Budget - Finance Tracker</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="section-card">
            <div class="section-header">
                <h4>📋 Budget for <span th:text="${currentMonth}"></span></h4>
                <a href="/budget/edit" class="btn-sm">✏️ Edit Budget</a>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">💰 Planned Income</div>
                    <div class="stat-value positive">
                        <span th:text="${#numbers.formatDecimal(budget.totalIncome, 1, 2)}"></span> TZS
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">💸 Planned Expenses</div>
                    <div class="stat-value negative">
                        <span th:text="${#numbers.formatDecimal(budget.totalExpense, 1, 2)}"></span> TZS
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">🎯 Savings Target</div>
                    <div class="stat-value positive">
                        <span th:text="${#numbers.formatDecimal(budget.savingsTarget, 1, 2)}"></span> TZS
                    </div>
                </div>
            </div>
            
            <h5 style="margin-top: 2rem; margin-bottom: 1rem; color: var(--primary-dark);">Category Breakdown</h5>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>Planned (TZS)</th>
                        <th>Actual (TZS)</th>
                        <th>Variance</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="entry : ${budget.categoryBudgets}">
                        <td th:text="${entry.key}">Category</td>
                        <td th:text="${#numbers.formatDecimal(entry.value.planned, 1, 2)}">Planned</td>
                        <td th:text="${#numbers.formatDecimal(entry.value.actual, 1, 2)}">Actual</td>
                        <td th:class="${entry.value.variance > 0 ? 'negative' : 'positive'}" th:text="${#numbers.formatDecimal(entry.value.variance, 1, 2)}">Variance</td>
                        <td>
                            <span th:if="${entry.value.variance > 0}" style="color: var(--danger);">⚠️ Over</span>
                            <span th:if="${entry.value.variance < 0}" style="color: var(--success);">✅ Under</span>
                            <span th:if="${entry.value.variance == 0}" style="color: #6B7280;">On Track</span>
                        </td>
                    </tr>
                    <tr th:if="${budget.categoryBudgets.empty}">
                        <td colspan="5" style="text-align: center; padding: 2rem;">No budget configured. <a href="/budget/edit">Create your budget</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
