<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Budget</title>
    
    <style layout:fragment="styles">
        .btn-edit-budget {
            background: var(--primary-dark);
            color: white;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 1rem;
        }
        
        .btn-edit-budget:hover {
            background: var(--secondary);
        }
        
        .over-budget {
            color: var(--danger);
            font-weight: bold;
        }
        
        .under-budget {
            color: var(--success);
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <a href="/budget/edit" class="btn-edit-budget"><i class="fas fa-edit"></i> Edit Budget</a>
        
        <div class="section-card">
            <div class="section-header">
                <h4><i class="fas fa-chart-line"></i> Budget Summary</h4>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">💰 Planned Income</div>
                    <div class="stat-value">
                        <span th:text="${budget != null ? #numbers.formatDecimal(budget.totalIncome, 1, 0) : '0'}"></span> TZS
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">💸 Planned Expenses</div>
                    <div class="stat-value">
                        <span th:text="${budget != null ? #numbers.formatDecimal(budget.totalExpense, 1, 0) : '0'}"></span> TZS
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">🎯 Savings Target</div>
                    <div class="stat-value">
                        <span th:text="${budget != null ? #numbers.formatDecimal(budget.savingsTarget, 1, 0) : '0'}"></span> TZS
                    </div>
                </div>
            </div>
        </div>
        
        <div class="section-card" th:if="${budget != null && !budget.categoryBudgets.isEmpty()}">
            <div class="section-header">
                <h4><i class="fas fa-list"></i> Category Breakdown</h4>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>Planned (TZS)</th>
                            <th>Actual (TZS)</th>
                            <th>Variance</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="entry : ${budget.categoryBudgets}">
                            <td th:text="${entry.key}">Category</td>
                            <td th:text="${#numbers.formatDecimal(entry.value.planned, 1, 0)}">Planned</td>
                            <td th:text="${#numbers.formatDecimal(entry.value.actual, 1, 0)}">Actual</td>
                            <td th:class="${entry.value.variance > 0 ? 'over-budget' : 'under-budget'}" 
                                th:text="${(entry.value.variance > 0 ? '+' : '') + #numbers.formatDecimal(entry.value.variance, 1, 0)}">Variance</td>
                            <td>
                                <span th:if="${entry.value.variance > 0}" class="badge badge-danger">⚠️ Over</span>
                                <span th:if="${entry.value.variance < 0}" class="badge badge-success">✅ Under</span>
                                <span th:if="${entry.value.variance == 0}" class="badge" style="background: #E5E7EB;">On Track</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="section-card" th:if="${budget == null || budget.categoryBudgets.isEmpty()}">
            <div class="empty-state">
                <i class="fas fa-wallet"></i>
                <p>No budget set for this month.</p>
                <p><a href="/budget/edit" style="color: var(--primary-dark); font-weight: 600;">Create your budget</a></p>
            </div>
        </div>
    </div>
</body>
</html>
