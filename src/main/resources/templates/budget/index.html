<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Debts</title>
</head>
<body>
    <div layout:fragment="content">
        <!-- Summary Cards -->
        <div class="summary-grid">
            <div class="summary-card">
                <div class="label">💰 Owed to Me</div>
                <div class="value green" th:text="${#numbers.formatDecimal(totalOwedToMe, 1, 0)} + ' TZS'">0 TZS</div>
            </div>
            <div class="summary-card">
                <div class="label">💸 I Owe</div>
                <div class="value red" th:text="${#numbers.formatDecimal(totalIOwe, 1, 0)} + ' TZS'">0 TZS</div>
            </div>
            <div class="summary-card">
                <div class="label">⚖️ Net Position</div>
                <div class="value" th:class="${netPosition >= 0 ? 'green' : 'red'}"
                     th:text="${#numbers.formatDecimal(netPosition, 1, 0)} + ' TZS'">0 TZS</div>
            </div>
            <div class="summary-card">
                <div class="label">📋 Total Records</div>
                <div class="value yellow" th:text="${debts.size()}">0</div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <a href="/debts/add" class="btn-add"><i class="fas fa-plus"></i> Add New Debt</a>
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center;">
                <span style="font-size:0.9rem; color: var(--gray-500);">Filter:</span>
                <select id="filterType" style="padding:0.5rem 0.75rem; border-radius:8px; border:1px solid var(--gray-300); font-size:0.9rem;" onchange="applyFilters()">
                    <option value="">All Types</option>
                    <option value="OWED_TO_ME">Owed to Me</option>
                    <option value="I_OWE">I Owe</option>
                </select>
                <select id="filterStatus" style="padding:0.5rem 0.75rem; border-radius:8px; border:1px solid var(--gray-300); font-size:0.9rem;" onchange="applyFilters()">
                    <option value="">All Status</option>
                    <option value="PENDING">Pending</option>
                    <option value="PARTIAL">Partial</option>
                    <option value="SETTLED">Settled</option>
                </select>
                <input type="number" id="minAmount" placeholder="Min Amount" style="padding:0.5rem 0.75rem; border-radius:8px; border:1px solid var(--gray-300); width:100px; font-size:0.9rem;" onkeyup="applyFilters()">
                <input type="number" id="maxAmount" placeholder="Max Amount" style="padding:0.5rem 0.75rem; border-radius:8px; border:1px solid var(--gray-300); width:100px; font-size:0.9rem;" onkeyup="applyFilters()">
                <a href="/debts" style="padding:0.5rem 0.75rem; background: var(--gray-400); color:white; border-radius:8px; text-decoration:none; font-size:0.9rem;">Reset</a>
            </div>
        </div>

        <!-- Table -->
        <div class="table-card">
            <div th:if="${debts.empty}" class="empty-state">
                <i class="fas fa-hand-holding-usd"></i>
                <p>No debt records yet.</p>
                <p style="margin-top:0.5rem;"><a href="/debts/add" style="color: var(--primary-dark); font-weight:600;">Add your first record</a></p>
            </div>

            <table class="data-table" th:if="${!debts.empty}" id="debtsTable">
                <thead>
                    <tr>
                        <th>Person</th>
                        <th>Type</th>
                        <th>Original</th>
                        <th>Remaining</th>
                        <th>Status</th>
                        <th>Due Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="debt : ${debts}" th:attr="data-type=${debt.type},data-status=${debt.status},data-amount=${debt.amount}">
                        <td>
                            <strong th:text="${debt.personName}"></strong>
                            <div th:if="${debt.phoneNumber}" style="font-size:0.78rem; color: var(--gray-500);" th:text="${debt.phoneNumber}"></div>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${debt.type == 'OWED_TO_ME' ? 'badge-owed' : 'badge-iowe'}"
                                  th:text="${debt.type == 'OWED_TO_ME' ? '💰 Owed to Me' : '💸 I Owe'}"></span>
                        </td>
                        <td th:text="${#numbers.formatDecimal(debt.amount, 1, 0)} + ' TZS'"></td>
                        <td>
                            <strong th:text="${#numbers.formatDecimal(debt.remainingAmount, 1, 0)} + ' TZS'"></strong>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${debt.status == 'SETTLED' ? 'badge-settled' : (debt.status == 'PARTIAL' ? 'badge-partial' : 'badge-pending')}"
                                  th:text="${debt.status}"></span>
                        </td>
                        <td>
                            <span th:if="${debt.dueDate != null}"
                                  th:text="${#temporals.format(debt.dueDate, 'dd MMM yyyy')}"
                                  th:classappend="${debt.dueDate.isBefore(#temporals.createNow()) and debt.status != 'SETTLED' ? 'overdue' : ''}"></span>
                            <span th:if="${debt.dueDate == null}" style="color: var(--gray-300);">—</span>
                        </td>
                        <td>
                            <div class="actions">
                                <a th:if="${debt.status != 'SETTLED'}"
                                   th:href="@{/debts/make-payment/{id}(id=${debt.id})}"
                                   class="btn-xs btn-payment" title="Record payment">
                                    <i class="fas fa-money-bill-wave"></i> Pay
                                </a>
                                <a th:href="@{/debts/edit/{id}(id=${debt.id})}"
                                   class="btn-xs btn-edit" title="Edit">
                                    <i class="fas fa-edit"></i> Edit
                                </a>
                                <a th:href="@{/debts/delete/{id}(id=${debt.id})}"
                                   class="btn-xs btn-delete" title="Delete"
                                   onclick="return confirm('Are you sure you want to delete this debt record?')">
                                    <i class="fas fa-trash"></i> Delete
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <th:block layout:fragment="scripts">
        <script>
            function applyFilters() {
                const typeFilter = document.getElementById('filterType').value;
                const statusFilter = document.getElementById('filterStatus').value;
                const minAmount = parseFloat(document.getElementById('minAmount').value) || 0;
                const maxAmount = parseFloat(document.getElementById('maxAmount').value) || Infinity;
                
                const rows = document.querySelectorAll('#debtsTable tbody tr');
                
                rows.forEach(row => {
                    const type = row.getAttribute('data-type');
                    const status = row.getAttribute('data-status');
                    const amount = parseFloat(row.getAttribute('data-amount'));
                    
                    let show = true;
                    
                    if (typeFilter && type !== typeFilter) show = false;
                    if (statusFilter && status !== statusFilter) show = false;
                    if (amount < minAmount || amount > maxAmount) show = false;
                    
                    row.style.display = show ? '' : 'none';
                });
            }
        </script>
    </th:block>
</body>
</html>
