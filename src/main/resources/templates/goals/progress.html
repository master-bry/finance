<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Update Progress</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="form-container">
            <h2 style="color: var(--primary-dark); margin-bottom: 1.5rem;">📈 Update Goal Progress</h2>
            
            <div class="info-box">
                <p><strong>🎯 Goal:</strong> <span th:text="${goal.name}"></span></p>
                <p><strong>🎯 Target:</strong> <span th:text="${#numbers.formatDecimal(goal.targetAmount, 1, 0)}"></span> TZS</p>
                <p><strong>📊 Current:</strong> <span th:text="${#numbers.formatDecimal(goal.currentAmount, 1, 0)}"></span> TZS</p>
                <p><strong>📈 Remaining:</strong> <span th:text="${#numbers.formatDecimal(goal.remainingAmount, 1, 0)}"></span> TZS</p>
                <div class="progress-bar" style="margin-top: 0.5rem;">
                    <div class="progress-fill" th:style="'width: ' + ${goal.progressPercentage} + '%;'"></div>
                </div>
                <p style="margin-top: 0.5rem;">Progress: <span th:text="${#numbers.formatDecimal(goal.progressPercentage, 1, 1)}"></span>%</p>
            </div>
            
            <form th:action="@{/goals/progress/{id}(id=${goal.id})}" method="post">
                <div class="form-group">
                    <label>Amount to Add (TZS) *</label>
                    <input type="number" step="0.01" name="amount" required placeholder="Enter amount">
                </div>
                <div class="form-group">
                    <label>Notes (optional)</label>
                    <input type="text" name="notes" placeholder="e.g., Monthly savings">
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Progress</button>
                    <a href="/goals" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
