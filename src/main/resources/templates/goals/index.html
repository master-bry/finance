<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Goals</title>
</head>
<body>
    <div layout:fragment="content">
        <a href="/goals/add" class="btn-add"><i class="fas fa-plus"></i> Add New Goal</a>
        
        <!-- Active Goals Section -->
        <div class="section-card">
            <div class="section-header">
                <h4><i class="fas fa-bullseye"></i> Active Goals (<span th:text="${activeGoals.size()}">0</span>)</h4>
            </div>
            
            <div th:if="${activeGoals.empty}" class="empty-state">
                <i class="fas fa-flag-checkered"></i>
                <p>No active goals. Click "Add New Goal" to get started!</p>
            </div>
            
            <div th:each="goal : ${activeGoals}" class="goal-item">
                <div class="goal-header">
                    <span th:text="${goal.name}"></span>
                    <span th:text="${#numbers.formatDecimal(goal.currentAmount, 1, 0)} + ' / ' + ${#numbers.formatDecimal(goal.targetAmount, 1, 0)} + ' TZS'"></span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" th:style="'width: ' + ${goal.progressPercentage} + '%;'"></div>
                </div>
                <div style="margin-top: 0.75rem;">
                    <a th:href="'/goals/progress/' + ${goal.id}" class="btn-xs btn-progress"><i class="fas fa-plus-circle"></i> Add Progress</a>
                    <a th:href="'/goals/edit/' + ${goal.id}" class="btn-xs btn-edit"><i class="fas fa-edit"></i> Edit</a>
                    <a th:href="'/goals/mark/' + ${goal.id}" class="btn-xs btn-complete"><i class="fas fa-check-circle"></i> Mark Complete</a>
                    <a th:href="'/goals/delete/' + ${goal.id}" class="btn-xs btn-delete" onclick="return confirm('Delete this goal?')"><i class="fas fa-trash"></i> Delete</a>
                </div>
                <div th:if="${goal.targetDate != null}" style="margin-top: 0.5rem; font-size: 0.8rem; color: var(--gray-500);">
                    <i class="fas fa-calendar"></i> Target Date: <span th:text="${#temporals.format(goal.targetDate, 'yyyy-MM-dd')}"></span>
                </div>
            </div>
        </div>
        
        <!-- Completed Goals Section -->
        <div class="section-card">
            <div class="section-header">
                <h4><i class="fas fa-trophy"></i> Completed Goals (<span th:text="${completedGoals.size()}">0</span>)</h4>
            </div>
            
            <div th:each="goal : ${completedGoals}" class="goal-item" style="border-left: 3px solid var(--success); padding-left: 1rem;">
                <div class="goal-header">
                    <span th:text="${goal.name}"></span>
                    <span class="positive">✓ Achieved!</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 100%;"></div>
                </div>
                <div th:if="${goal.achievedDate != null}" style="margin-top: 0.5rem; font-size: 0.8rem; color: var(--gray-500);">
                    <i class="fas fa-calendar-check"></i> Completed: <span th:text="${#temporals.format(goal.achievedDate, 'yyyy-MM-dd')}"></span>
                </div>
            </div>
            <div th:if="${completedGoals.empty}" class="empty-state" style="padding: 1rem;">
                <p>No completed goals yet. Keep working towards your targets!</p>
            </div>
        </div>
    </div>
</body>
</html>
