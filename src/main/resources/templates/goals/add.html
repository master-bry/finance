<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Add Goal</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="form-container">
            <h2 style="color: var(--primary-dark); margin-bottom: 1.5rem;">➕ Add New Goal</h2>
            
            <form action="/goals/add" method="post">
                <div class="form-group">
                    <label>Goal Name *</label>
                    <input type="text" name="name" required placeholder="e.g., Buy a car, Save for vacation, Emergency fund">
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Category *</label>
                        <select name="category" required>
                            <option value="SAVINGS">💰 Savings</option>
                            <option value="PURCHASE">🛍️ Purchase</option>
                            <option value="TRAVEL">✈️ Travel</option>
                            <option value="INVESTMENT">📈 Investment</option>
                            <option value="DEBT_PAYMENT">💸 Debt Payment</option>
                            <option value="EDUCATION">📚 Education</option>
                            <option value="HEALTHCARE">🏥 Healthcare</option>
                            <option value="OTHER">📌 Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select name="priority">
                            <option value="HIGH">🔴 High</option>
                            <option value="MEDIUM" selected>🟡 Medium</option>
                            <option value="LOW">🟢 Low</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Target Amount *</label>
                        <input type="number" step="0.01" name="targetAmount" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Target Date</label>
                        <input type="date" name="targetDate">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3" placeholder="Describe your goal..."></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Goal</button>
                    <a href="/goals" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
