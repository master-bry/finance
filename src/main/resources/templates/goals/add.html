<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Goal - Finance Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #2F6B3F;
            --sidebar-width: 280px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #FFF6C0; }
        
        .sidebar {
            position: fixed; left: 0; top: 0; width: var(--sidebar-width); height: 100vh;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #1a4d2a 100%);
            color: white; padding: 1.5rem; overflow-y: auto;
        }
        .sidebar-header { text-align: center; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 1.5rem; }
        .sidebar-header h2 span { color: #F7C85C; }
        .nav-menu { list-style: none; }
        .nav-item { margin-bottom: 0.5rem; }
        .nav-link { display: flex; align-items: center; padding: 0.75rem 1rem; color: white; text-decoration: none; border-radius: 10px; gap: 12px; transition: all 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-link.active { background: #F7C85C; color: var(--primary-dark); font-weight: bold; }
        
        .main-content { margin-left: var(--sidebar-width); padding: 1.5rem; min-height: 100vh; }
        .top-bar {
            background: white; border-radius: 15px; padding: 1rem 1.5rem; margin-bottom: 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logout-btn { background: #EF4444; color: white; padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; }
        
        .form-container {
            background: white; border-radius: 15px; padding: 2rem; max-width: 600px; margin: 0 auto;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.75rem; border: 2px solid #E5E7EB; border-radius: 10px; font-size: 1rem;
        }
        .btn-save { background: var(--primary-dark); color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 10px; cursor: pointer; width: 100%; }
        .btn-save:hover { background: #7FB77E; }
        .btn-back { background: #6B7280; color: white; padding: 0.75rem 1.5rem; border-radius: 10px; text-decoration: none; display: inline-block; margin-top: 1rem; text-align: center; width: 100%; }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .alert-error { background: #FEE2E2; color: #991B1B; padding: 1rem; border-radius: 10px; margin-bottom: 1rem; }
        
        .mobile-menu-btn { display: none; position: fixed; top: 1rem; left: 1rem; z-index: 1100; background: var(--primary-dark); color: white; padding: 0.5rem; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-menu-btn { display: block; }
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h2>💰 Finance<span>Tracker</span></h2><p>Manage Your Finances</p></div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li class="nav-item"><a href="/transactions" class="nav-link"><i class="fas fa-exchange-alt"></i> Transactions</a></li>
            <li class="nav-item"><a href="/debts" class="nav-link"><i class="fas fa-hand-holding-usd"></i> Debts</a></li>
            <li class="nav-item"><a href="/investments" class="nav-link"><i class="fas fa-chart-line"></i> Investments</a></li>
            <li class="nav-item"><a href="/goals" class="nav-link active"><i class="fas fa-bullseye"></i> Goals</a></li>
            <li class="nav-item"><a href="/budget" class="nav-link"><i class="fas fa-wallet"></i> Budget</a></li>
            <li class="nav-item"><a href="/daily-entry" class="nav-link"><i class="fas fa-calendar-day"></i> Daily Entry</a></li>
            <li class="nav-item"><a href="/reports" class="nav-link"><i class="fas fa-chart-bar"></i> Reports</a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="top-bar">
            <div><h3>➕ Add New Goal</h3><p>Set a financial target</p></div>
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
        
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        
        <div class="form-container">
            <form action="/goals/add" method="post">
                <div class="form-group">
                    <label>Goal Name *</label>
                    <input type="text" name="name" required placeholder="e.g., Buy a car, Save for vacation, Emergency fund">
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Category *</label>
                        <select name="category" required>
                            <option value="SAVINGS">💰 Savings</option>
                            <option value="PURCHASE">🛍️ Purchase</option>
                            <option value="TRAVEL">✈️ Travel</option>
                            <option value="INVESTMENT">📈 Investment</option>
                            <option value="DEBT_PAYMENT">💸 Debt Payment</option>
                            <option value="EDUCATION">📚 Education</option>
                            <option value="HEALTHCARE">🏥 Healthcare</option>
                            <option value="OTHER">📌 Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select name="priority">
                            <option value="HIGH">🔴 High</option>
                            <option value="MEDIUM" selected>🟡 Medium</option>
                            <option value="LOW">🟢 Low</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Target Amount *</label>
                        <input type="number" step="0.01" name="targetAmount" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Target Date</label>
                        <input type="date" name="targetDate">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3" placeholder="Describe your goal..."></textarea>
                </div>
                
                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Save Goal</button>
                <a href="/goals" class="btn-back"><i class="fas fa-arrow-left"></i> Cancel</a>
            </form>
        </div>
    </div>
    
    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    </script>
</body>
</html>
