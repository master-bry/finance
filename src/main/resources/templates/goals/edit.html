<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Goal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #FFF6C0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2F6B3F;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2F6B3F;
            box-shadow: 0 0 5px rgba(47, 107, 63, 0.3);
        }
        button {
            background: #2F6B3F;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { 
            background: #7FB77E;
        }
        .error-container {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .error-item {
            margin: 5px 0;
            list-style: none;
        }
        .field-error {
            border-color: #dc3545 !important;
        }
        .field-error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 3px;
        }
        .back-link {
            margin-top: 20px;
            display: inline-block;
            color: #2F6B3F;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .required {
            color: #dc3545;
            margin-left: 2px;
        }
        .progress-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            background: linear-gradient(90deg, #28a745, #7FB77E);
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Edit Goal</h1>
        
        <div th:if="${#fields.hasErrors('goal')}" class="error-container">
            <strong>Please fix the following errors:</strong>
            <ul>
                <li th:each="error : ${#fields.errors('goal')}" class="error-item">
                    <span th:text="${error}"></span>
                </li>
            </ul>
        </div>
        
        <div class="progress-box">
            <strong>Current Progress</strong>
            <div class="progress-bar">
                <div class="progress-fill" th:style="'width: ' + ${goal.progressPercentage} + '%;'"></div>
            </div>
            <p style="margin-top: 8px; font-size: 14px;">
                <span th:text="${goal.currentAmount}">0</span> / 
                <span th:text="${goal.targetAmount}">0</span> TZS 
                (<span th:text="${goal.progressPercentage}">0</span>% complete)
            </p>
        </div>
        
        <form action="#" th:action="@{/goals/edit/{id}(id=${goal.id})}" th:object="${goal}" method="post">
            <div class="form-group">
                <label>Goal Name <span class="required">*</span></label>
                <input type="text" th:field="*{name}" required
                       th:class="${#fields.hasErrors('name') ? 'field-error' : ''}">
                <div th:if="${#fields.hasErrors('name')}" class="field-error-message"
                     th:errors="*{name}"></div>
            </div>
            
            <div class="form-group">
                <label>Category <span class="required">*</span></label>
                <select th:field="*{category}" required
                        th:class="${#fields.hasErrors('category') ? 'field-error' : ''}">
                    <option value="SAVINGS">💰 Savings</option>
                    <option value="INVESTMENT">📈 Investment</option>
                    <option value="TRAVEL">✈️ Travel</option>
                    <option value="EDUCATION">🎓 Education</option>
                    <option value="HOME">🏠 Home</option>
                    <option value="CAR">🚗 Car</option>
                    <option value="HEALTH">💪 Health</option>
                    <option value="OTHER">📌 Other</option>
                </select>
                <div th:if="${#fields.hasErrors('category')}" class="field-error-message"
                     th:errors="*{category}"></div>
            </div>
            
            <div class="form-group">
                <label>Target Amount (TZS) <span class="required">*</span></label>
                <input type="number" step="0.01" th:field="*{targetAmount}" required
                       th:class="${#fields.hasErrors('targetAmount') ? 'field-error' : ''}">
                <div th:if="${#fields.hasErrors('targetAmount')}" class="field-error-message"
                     th:errors="*{targetAmount}"></div>
            </div>
            
            <div class="form-group">
                <label>Current Amount (TZS)</label>
                <input type="number" step="0.01" th:field="*{currentAmount}" placeholder="0.00">
            </div>
            
            <div class="form-group">
                <label>Due Date</label>
                <input type="datetime-local" th:field="*{dueDate}">
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3"></textarea>
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" th:field="*{achieved}">
                    Mark as Achieved
                </label>
            </div>
            
            <button type="submit">💾 Save Changes</button>
        </form>
        
        <a href="/goals" class="back-link">← Back to Goals</a>
    </div>
</body>
</html>
