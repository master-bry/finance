<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Edit Goal</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="form-container">
            <h2 style="color: var(--primary-dark); margin-bottom: 1.5rem;">✏️ Edit Goal</h2>
            
            <form action="#" th:action="@{/goals/edit/{id}(id=${goal.id})}" th:object="${goal}" method="post">
                <div class="form-group">
                    <label>Goal Name *</label>
                    <input type="text" th:field="*{name}" required>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Category *</label>
                        <select th:field="*{category}" required>
                            <option value="SAVINGS">💰 Savings</option>
                            <option value="PURCHASE">🛍️ Purchase</option>
                            <option value="TRAVEL">✈️ Travel</option>
                            <option value="INVESTMENT">📈 Investment</option>
                            <option value="DEBT_PAYMENT">💸 Debt Payment</option>
                            <option value="EDUCATION">📚 Education</option>
                            <option value="HEALTHCARE">🏥 Healthcare</option>
                            <option value="OTHER">📌 Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select th:field="*{priority}">
                            <option value="HIGH">🔴 High</option>
                            <option value="MEDIUM">🟡 Medium</option>
                            <option value="LOW">🟢 Low</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Target Amount *</label>
                        <input type="number" step="0.01" th:field="*{targetAmount}" required>
                    </div>
                    <div class="form-group">
                        <label>Current Amount</label>
                        <input type="number" step="0.01" th:field="*{currentAmount}" readonly style="background: var(--gray-100);">
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Target Date</label>
                        <input type="date" th:field="*{targetDate}">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select th:field="*{achieved}">
                            <option th:value="false">In Progress</option>
                            <option th:value="true">Achieved</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" rows="3"></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                    <a href="/goals" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
