<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Finance Tracker">Finance Tracker</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Main Layout CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <!-- Page-specific CSS placeholder -->
    <th:block layout:fragment="styles"></th:block>
</head>
<body>
    <!-- Mobile Menu Button -->
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Navigation Drawer -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>💰 Finance<span>Tracker</span></h2>
            <p>Manage Your Finances</p>
        </div>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="/dashboard" class="nav-link" th:classappend="${currentPage == 'dashboard' ? 'active' : ''}">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="/transactions" class="nav-link" th:classappend="${currentPage == 'transactions' ? 'active' : ''}">
                    <i class="fas fa-exchange-alt"></i> Transactions
                </a>
            </li>
            <li class="nav-item">
                <a href="/debts" class="nav-link" th:classappend="${currentPage == 'debts' ? 'active' : ''}">
                    <i class="fas fa-hand-holding-usd"></i> Debts
                </a>
            </li>
            <li class="nav-item">
                <a href="/investments" class="nav-link" th:classappend="${currentPage == 'investments' ? 'active' : ''}">
                    <i class="fas fa-chart-line"></i> Investments
                </a>
            </li>
            <li class="nav-item">
                <a href="/goals" class="nav-link" th:classappend="${currentPage == 'goals' ? 'active' : ''}">
                    <i class="fas fa-bullseye"></i> Goals
                </a>
            </li>
            <li class="nav-item">
                <a href="/budget" class="nav-link" th:classappend="${currentPage == 'budget' ? 'active' : ''}">
                    <i class="fas fa-wallet"></i> Budget
                </a>
            </li>
            <li class="nav-item">
                <a href="/excel/daily-entry" class="nav-link" th:classappend="${currentPage == 'daily' ? 'active' : ''}">
                    <i class="fas fa-calendar-day"></i> Daily Entry
                </a>
            </li>
            <!-- NEW: Bills link -->
            <li class="nav-item">
                <a href="/bills" class="nav-link" th:classappend="${currentPage == 'bills' ? 'active' : ''}">
                    <i class="fas fa-file-invoice"></i> Bills
                </a>
            </li>
            <li class="nav-item">
                <a href="/reports" class="nav-link" th:classappend="${currentPage == 'reports' ? 'active' : ''}">
                    <i class="fas fa-chart-bar"></i> Reports
                </a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="welcome-text">
                <h3>Welcome back, <span sec:authentication="name"></span>!</h3>
                <p th:text="${pageSubtitle}">Manage your finances</p>
            </div>
            <div class="user-info">
                <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>

        <!-- Alert Messages -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- Page Content -->
        <div layout:fragment="content">
            <!-- Page-specific content goes here -->
        </div>
    </div>
    <!-- Delete Confirmation Modal -->
<div id="deleteModal" class="modal-overlay" style="display: none;">
    <div class="modal-container">
        <div class="modal-header">
            <h3><i class="fas fa-exclamation-triangle" style="color: var(--warning);"></i> Are you sure?</h3>
            <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p id="deleteModalMessage">Are you sure you want to remove this item?</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeDeleteModal()">Close</button>
            <button class="btn btn-danger" id="deleteConfirmBtn">Yes, Delete It!</button>
        </div>
    </div>
</div>

    <!-- Common JavaScript -->
    <script th:inline="javascript">
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
        
        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.querySelector('.mobile-menu-btn');
            
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(event.target) && !menuBtn.contains(event.target) && sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                }
            }
        });
        let deleteCallback = null;
    
    function showDeleteModal(message, onConfirm) {
        document.getElementById('deleteModalMessage').textContent = message || 'Are you sure you want to remove this item?';
        deleteCallback = onConfirm;
        document.getElementById('deleteModal').style.display = 'flex';
    }
    
    function closeDeleteModal() {
        document.getElementById('deleteModal').style.display = 'none';
        deleteCallback = null;
    }
    
    document.getElementById('deleteConfirmBtn').addEventListener('click', function() {
        if (deleteCallback) {
            deleteCallback();
        }
        closeDeleteModal();
    });
    
    // Close when clicking outside the modal
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeDeleteModal();
        }
    });

    // Offline Detection
    window.addEventListener('offline', function() {
    window.location.href = '/error/offline';
     });
     function showInfoToast(message, title = 'Info') {
      showToast(message, 'info', title);
      }
    </script>
    
    <!-- Page-specific JavaScript placeholder -->
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
