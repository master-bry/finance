<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Finance Tracker'">Finance Tracker</title>
    <!-- External CSS -->
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Mobile Menu Button -->
    <div class="mobile-menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>
    
    <!-- Sidebar Navigation -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>💰 Finance<span>Tracker</span></h2>
            <p>Manage Your Finances</p>
        </div>
        
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="/dashboard" class="nav-link" th:classappend="${currentPage == 'dashboard' ? 'active' : ''}">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="/transactions" class="nav-link" th:classappend="${currentPage == 'transactions' ? 'active' : ''}">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Transactions</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="/debts" class="nav-link" th:classappend="${currentPage == 'debts' ? 'active' : ''}">
                    <i class="fas fa-hand-holding-usd"></i>
                    <span>Debts</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="/investments" class="nav-link" th:classappend="${currentPage == 'investments' ? 'active' : ''}">
                    <i class="fas fa-chart-line"></i>
                    <span>Investments</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="/goals" class="nav-link" th:classappend="${currentPage == 'goals' ? 'active' : ''}">
                    <i class="fas fa-bullseye"></i>
                    <span>Goals</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="/budget" class="nav-link" th:classappend="${currentPage == 'budget' ? 'active' : ''}">
                    <i class="fas fa-wallet"></i>
                    <span>Budget</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="/daily-entry" class="nav-link" th:classappend="${currentPage == 'daily' ? 'active' : ''}">
                    <i class="fas fa-calendar-day"></i>
                    <span>Daily Entry</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="/reports" class="nav-link" th:classappend="${currentPage == 'reports' ? 'active' : ''}">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reports</span>
                </a>
            </li>
        </ul>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="welcome-text">
                <h3>Welcome back, <span sec:authentication="name"></span>!</h3>
                <p th:text="${pageSubtitle}">Manage your finances</p>
            </div>
            <div class="user-info">
                <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
        
        <!-- Alert Messages -->
        <div th:if="${success}" class="alert-success" style="background: #D1FAE5; color: #065F46; padding: 1rem; border-radius: 10px; margin-bottom: 1rem;" th:text="${success}"></div>
        <div th:if="${error}" class="alert-error" style="background: #FEE2E2; color: #991B1B; padding: 1rem; border-radius: 10px; margin-bottom: 1rem;" th:text="${error}"></div>
        
        <!-- Page Content -->
        <div th:replace="${pageContent}"></div>
    </div>
    
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>
</body>
</html>
