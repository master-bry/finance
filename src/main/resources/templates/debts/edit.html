<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Debt</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #FFF6C0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        h1 { color: #2F6B3F; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #2F6B3F;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #7FB77E; }
        .back-link { margin-top: 20px; display: inline-block; }
        .payment-history {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Edit Debt</h1>
        
        <form action="#" th:action="@{/debts/edit/{id}(id=${debt.id})}" th:object="${debt}" method="post">
            <div class="form-group">
                <label>Person Name *</label>
                <input type="text" th:field="*{personName}" required>
            </div>
            
            <div class="form-group">
                <label>Type *</label>
                <select th:field="*{type}" required>
                    <option value="OWED_TO_ME">💰 Owed to me</option>
                    <option value="I_OWE">💸 I owe</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Amount *</label>
                <input type="number" step="0.01" th:field="*{amount}" required>
            </div>
            
            <div class="form-group">
                <label>Status</label>
                <select th:field="*{status}">
                    <option value="PENDING">Pending</option>
                    <option value="PARTIAL">Partial</option>
                    <option value="SETTLED">Settled</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" th:field="*{phoneNumber}">
            </div>
            
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" th:field="*{dueDate}">
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3"></textarea>
            </div>
            
            <div class="form-group">
                <label>Notes</label>
                <textarea th:field="*{notes}" rows="2"></textarea>
            </div>
            
            <div th:if="${!debt.paymentHistory.empty}" class="payment-history">
                <h4>📜 Payment History</h4>
                <ul>
                    <li th:each="payment : ${debt.paymentHistory}">
                        📅 <span th:text="${#temporals.format(payment.paymentDate, 'yyyy-MM-dd HH:mm')}"></span>
                        - Paid <strong th:text="${payment.amountPaid}"></strong> TZS
                        <span th:if="${payment.notes}" th:text="' - ' + ${payment.notes}"></span>
                    </li>
                </ul>
            </div>
            
            <button type="submit">💾 Save Changes</button>
        </form>
        
        <a href="/debts" class="back-link">← Back to Debts</a>
    </div>
</body>
</html>
