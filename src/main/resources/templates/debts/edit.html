<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Edit Debt</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="form-container">
            <h2 style="color: var(--primary-dark); margin-bottom: 0.3rem;">💳 Edit Details</h2>
            <p style="color: var(--gray-500); margin-bottom: 1.5rem;">Update debt record</p>
            
            <form th:action="@{/debts/edit/{id}(id=${debt.id})}" th:object="${debt}" method="post">
                <div class="form-group">
                    <label for="personName">Person Name *</label>
                    <input type="text" id="personName" th:field="*{personName}" required>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="type">Type *</label>
                        <select id="type" th:field="*{type}" required>
                            <option value="OWED_TO_ME">💰 Owed to Me</option>
                            <option value="I_OWE">💸 I Owe</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="amount">Original Amount (TZS) *</label>
                        <input type="number" step="0.01" id="amount" th:field="*{amount}"  required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="remainingAmount">Remaining Amount (TZS)</label>
                        <input type="number" step="0.01" id="remainingAmount" th:field="*{remainingAmount}" readonly style="background:#F3F4F6;">
                        <small style="color: var(--gray-500); font-size:0.78rem;">Updated automatically via payments</small>
                    </div>
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" th:field="*{status}">
                            <option value="PENDING">⏳ Pending</option>
                            <option value="PARTIAL">🔶 Partial</option>
                            <option value="SETTLED">✅ Settled</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="tel" id="phoneNumber" th:field="*{phoneNumber}">
                    </div>
                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate" th:field="*{dueDate}">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" th:field="*{notes}" rows="2"></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                    <a href="/debts" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>
            
            <!-- Payment History -->
            <div th:if="${debt != null && !debt.paymentHistory.empty}" class="payment-history">
                <h3><i class="fas fa-history"></i> Payment History</h3>
                <ul class="payment-list">
                    <li th:each="payment : ${debt.paymentHistory}">
                        <div>
                            <span class="payment-date" th:text="${#temporals.format(payment.paymentDate, 'dd MMM yyyy HH:mm')}"></span>
                            <div th:if="${payment.notes}" style="font-size:0.82rem; color: var(--gray-500);" th:text="${payment.notes}"></div>
                        </div>
                        <span class="payment-amount" th:text="${#numbers.formatDecimal(payment.amountPaid, 1, 0)} + ' TZS'"></span>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
