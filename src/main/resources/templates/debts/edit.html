<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Debt - Finance Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    
    <div class="sidebar" id="sidebar">
        <!-- same sidebar -->
    </div>
    
    <div class="main-content">
        <div class="top-bar">
            <div>
                <h3>✏️ Edit Debt</h3>
                <p>Update debt record</p>
            </div>
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
        
        <div class="form-container">
            <h2>💳 Edit Details</h2>
            <form th:action="@{/debts/edit/{id}(id=${debt.id})}" th:object="${debt}" method="post">
                <div class="form-group">
                    <label>Person Name *</label>
                    <input type="text" th:field="*{personName}" required>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Type *</label>
                        <select th:field="*{type}" required>
                            <option value="OWED_TO_ME">💰 Owed to Me</option>
                            <option value="I_OWE">💸 I Owe</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Original Amount (TZS) *</label>
                        <input type="number" step="0.01" th:field="*{amount}" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Remaining Amount (TZS)</label>
                        <input type="number" step="0.01" th:field="*{remainingAmount}" readonly style="background:#F3F4F6;">
                        <small>Updated automatically via payments</small>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select th:field="*{status}">
                            <option value="PENDING">⏳ Pending</option>
                            <option value="PARTIAL">🔶 Partial</option>
                            <option value="SETTLED">✅ Settled</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" th:field="*{phoneNumber}">
                    </div>
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" th:field="*{dueDate}">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Notes</label>
                    <textarea th:field="*{notes}" rows="2"></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                    <a href="/debts" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>
            
            <!-- Payment History -->
            <div th:if="${!debt.paymentHistory.empty}" class="payment-history">
                <h3><i class="fas fa-history"></i> Payment History</h3>
                <ul class="payment-list">
                    <li th:each="payment : ${debt.paymentHistory}">
                        <div>
                            <span class="payment-date" th:text="${#temporals.format(payment.paymentDate, 'dd MMM yyyy HH:mm')}"></span>
                            <div th:if="${payment.notes}" th:text="${payment.notes}"></div>
                        </div>
                        <span class="payment-amount" th:text="${#numbers.formatDecimal(payment.amountPaid, 1, 0)} + ' TZS'"></span>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    </script>
</body>
</html>
