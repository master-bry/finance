<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Debt - Finance Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    
    <div class="sidebar" id="sidebar">
        <!-- same sidebar -->
    </div>
    
    <div class="main-content">
        <div class="top-bar">
            <div>
                <h3>➕ Add New Debt</h3>
                <p>Record a new debt or lending</p>
            </div>
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
        
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        
        <div class="form-container">
            <h2>💳 Debt Details</h2>
            <form th:action="@{/debts/add}" th:object="${debt}" method="post">
                <div class="form-group">
                    <label>Person Name *</label>
                    <input type="text" th:field="*{personName}" required placeholder="Enter person's name">
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Type *</label>
                        <select th:field="*{type}" required>
                            <option value="">Select type</option>
                            <option value="OWED_TO_ME">💰 Owed to Me</option>
                            <option value="I_OWE">💸 I Owe</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Amount (TZS) *</label>
                        <input type="number" step="0.01" th:field="*{amount}" required placeholder="0.00" min="0.01">
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" th:field="*{phoneNumber}" placeholder="Optional">
                    </div>
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" th:field="*{dueDate}">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" rows="3" placeholder="What is this debt for?"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Additional Notes</label>
                    <textarea th:field="*{notes}" rows="2" placeholder="Any additional information..."></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Debt</button>
                    <a href="/debts" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    </script>
</body>
</html>
