<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Add Debt</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="form-container">
            <h2 style="color: var(--primary-dark); margin-bottom: 0.3rem;">💳 Debt Details</h2>
            <p style="color: var(--gray-500); margin-bottom: 1.5rem;">Record a new debt or lending</p>
            
            <form th:action="@{/debts/add}" th:object="${debt}" method="post">
                <div class="form-group">
                    <label for="personName">Person Name *</label>
                    <input type="text" id="personName" th:field="*{personName}" required placeholder="Enter person's name">
                    <div th:if="${#fields.hasErrors('personName')}" th:errors="*{personName}" class="error-message"></div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="type">Type *</label>
                        <select id="type" th:field="*{type}" required>
                            <option value="">Select type</option>
                            <option value="OWED_TO_ME">💰 Owed to Me</option>
                            <option value="I_OWE">💸 I Owe</option>
                        </select>
                        <div th:if="${#fields.hasErrors('type')}" th:errors="*{type}" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount (TZS) *</label>
                        <input type="number" step="0.01" id="amount" th:field="*{amount}" required placeholder="0.00" min="0.01">
                        <div th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}" class="error-message"></div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="tel" id="phoneNumber" th:field="*{phoneNumber}" placeholder="Optional">
                    </div>
                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate" th:field="*{dueDate}">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}" rows="3" placeholder="What is this debt for?"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="notes">Additional Notes</label>
                    <textarea id="notes" th:field="*{notes}" rows="2" placeholder="Any additional information..."></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Debt</button>
                    <a href="/debts" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
