<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Debt</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #FFF6C0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        h1 { color: #2F6B3F; }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #2F6B3F;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #7FB77E; }
        .error { color: red; font-size: 12px; }
        .back-link { margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>➕ Add New Debt</h1>
        
        <form action="#" th:action="@{/debts/add}" th:object="${debt}" method="post">
            <div class="form-group">
                <label>Person Name *</label>
                <input type="text" th:field="*{personName}" required placeholder="Enter person's name">
            </div>
            
            <div class="form-group">
                <label>Type *</label>
                <select th:field="*{type}" required>
                    <option value="">Select type</option>
                    <option value="OWED_TO_ME">💰 Owed to me (Someone owes me money)</option>
                    <option value="I_OWE">💸 I owe (I owe someone money)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Amount *</label>
                <input type="number" step="0.01" th:field="*{amount}" required placeholder="0.00">
            </div>
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" th:field="*{phoneNumber}" placeholder="Optional">
            </div>
            
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" th:field="*{dueDate}">
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3" placeholder="What is this debt for?"></textarea>
            </div>
            
            <div class="form-group">
                <label>Notes</label>
                <textarea th:field="*{notes}" rows="2" placeholder="Additional information..."></textarea>
            </div>
            
            <button type="submit">💾 Save Debt</button>
        </form>
        
        <a href="/debts" class="back-link">← Back to Debts</a>
    </div>
</body>
</html>
