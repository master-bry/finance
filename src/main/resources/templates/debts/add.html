<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Debt - Finance Tracker</title>
</head>
<body>
    <div class="form-container">
        <h2><i class="fas fa-hand-holding-usd"></i> Add New Debt</h2>
        
        <form action="#" th:action="@{/debts/add}" th:object="${debt}" method="post">
            <div class="form-group">
                <label>Person Name *</label>
                <input type="text" th:field="*{personName}" required placeholder="Enter person's name">
            </div>
            
            <div class="form-group">
                <label>Type *</label>
                <select th:field="*{type}" required>
                    <option value="">Select type</option>
                    <option value="OWED_TO_ME">💰 Owed to me (Someone owes me money)</option>
                    <option value="I_OWE">💸 I owe (I owe someone money)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Amount *</label>
                <input type="number" step="0.01" th:field="*{amount}" required placeholder="0.00">
            </div>
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" th:field="*{phoneNumber}" placeholder="Optional">
            </div>
            
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" th:field="*{dueDate}">
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3"></textarea>
            </div>
            
            <button type="submit" class="btn-save">💾 Save Debt</button>
            <a href="/debts" class="btn-back" style="margin-left: 1rem;">Cancel</a>
        </form>
    </div>
</body>
</html>
