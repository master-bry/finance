<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Debts - Finance Tracker</title>
</head>
<body>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-title">💰 Owed to Me</div>
            <div class="stat-value positive">
                <span th:text="${#numbers.formatDecimal(totalOwedToMe, 1, 2)}"></span> TZS
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-title">💸 I Owe</div>
            <div class="stat-value negative">
                <span th:text="${#numbers.formatDecimal(totalIOwe, 1, 2)}"></span> TZS
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-title">⚖️ Net Position</div>
            <div class="stat-value" th:class="${netPosition >= 0 ? 'positive' : 'negative'}">
                <span th:text="${#numbers.formatDecimal(netPosition, 1, 2)}"></span> TZS
            </div>
        </div>
    </div>
    
    <a href="/debts/add" class="btn-add"><i class="fas fa-plus"></i> Add Debt</a>
    
    <div class="section-card">
        <div class="section-header">
            <h4><i class="fas fa-hand-holding-usd"></i> All Debts</h4>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Person</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Remaining</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="debt : ${debts}">
                    <td th:text="${debt.personName}">Name</td>
                    <td>
                        <span th:if="${debt.type == 'OWED_TO_ME'}" style="color: var(--success);">💰 Owed to me</span>
                        <span th:if="${debt.type == 'I_OWE'}" style="color: var(--danger);">💸 I owe</span>
                    </td>
                    <td th:text="${#numbers.formatDecimal(debt.amount, 1, 2)} + ' TZS'">Amount</td>
                    <td th:text="${#numbers.formatDecimal(debt.remainingAmount, 1, 2)} + ' TZS'">Remaining</td>
                    <td>
                        <span th:if="${debt.status == 'PENDING'}" style="background: #FEF3C7; padding: 0.25rem 0.5rem; border-radius: 20px;">Pending</span>
                        <span th:if="${debt.status == 'PARTIAL'}" style="background: #FEF3C7; padding: 0.25rem 0.5rem; border-radius: 20px;">Partial</span>
                        <span th:if="${debt.status == 'SETTLED'}" style="background: #D1FAE5; padding: 0.25rem 0.5rem; border-radius: 20px;">Settled</span>
                    </td>
                    <td th:text="${#temporals.format(debt.dateGiven, 'yyyy-MM-dd')}">Date</td>
                    <td>
                        <a th:href="'/debts/make-payment/' + ${debt.id}" class="btn-sm" style="background: var(--success);">Pay</a>
                        <a th:href="'/debts/edit/' + ${debt.id}" class="btn-sm" style="background: #3B82F6;">Edit</a>
                        <a th:href="'/debts/delete/' + ${debt.id}" class="btn-sm" style="background: var(--danger);" onclick="return confirm('Delete this debt?')">Delete</a>
                    </td>
                </tr>
                <tr th:if="${debts.empty}">
                    <td colspan="7" style="text-align: center;">No debts yet. <a href="/debts/add">Add your first debt!</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
