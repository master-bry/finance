<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Debt Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #FFF6C0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        h1 { color: #2F6B3F; }
        .btn-add {
            background: #2F6B3F;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .btn-back {
            background: #6c757d;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            display: inline-block;
            margin-left: 10px;
            border-radius: 5px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            flex: 1;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: bold; }
        .positive { color: green; }
        .negative { color: red; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #2F6B3F;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-PENDING { background: #ffc107; color: #333; }
        .status-PARTIAL { background: #17a2b8; color: white; }
        .status-SETTLED { background: #28a745; color: white; }
        .btn-edit, .btn-delete, .btn-pay {
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 5px;
            margin: 0 2px;
            display: inline-block;
            font-size: 12px;
        }
        .btn-edit { background: #007bff; color: white; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-pay { background: #28a745; color: white; }
        .section-title {
            margin-top: 30px;
            padding: 10px;
            background: #2F6B3F;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Debt Management</h1>
        <a href="/debts/add" class="btn-add">➕ Add New Debt</a>
        <a href="/dashboard" class="btn-back">← Back to Dashboard</a>
        
        <div class="stats">
            <div class="stat-card">
                <div>💰 Owed to Me</div>
                <div class="stat-value positive" th:text="${totalOwedToMe} + ' TZS'">0</div>
            </div>
            <div class="stat-card">
                <div>💸 I Owe</div>
                <div class="stat-value negative" th:text="${totalIOwe} + ' TZS'">0</div>
            </div>
            <div class="stat-card">
                <div>⚖️ Net Position</div>
                <div class="stat-value" th:class="${netPosition >= 0 ? 'positive' : 'negative'}" 
                     th:text="${netPosition} + ' TZS'">0</div>
            </div>
        </div>
        
        <h3 class="section-title">📋 All Debts</h3>
        
        <table>
            <thead>
                <tr>
                    <th>Person</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Remaining</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="debt : ${debts}">
                    <td th:text="${debt.personName}">Name</td>
                    <td>
                        <span th:if="${debt.type == 'OWED_TO_ME'}" style="color: green;">💰 Owed to me</span>
                        <span th:if="${debt.type == 'I_OWE'}" style="color: red;">💸 I owe</span>
                    </td>
                    <td th:text="${debt.amount} + ' TZS'">Amount</td>
                    <td th:text="${debt.remainingAmount} + ' TZS'">Remaining</td>
                    <td>
                        <span class="status-badge" th:class="'status-' + ${debt.status}" th:text="${debt.status}"></span>
                    </td>
                    <td th:text="${#temporals.format(debt.dateGiven, 'yyyy-MM-dd')}">Date</td>
                    <td>
                        <a th:href="'/debts/make-payment/' + ${debt.id}" class="btn-pay">💰 Pay</a>
                        <a th:href="'/debts/edit/' + ${debt.id}" class="btn-edit">✏️ Edit</a>
                        <form th:action="'/debts/delete/' + ${debt.id}" method="post" style="display: inline;" 
                              onsubmit="return confirm('Delete this debt?')">
                            <input type="hidden" name="_method" value="DELETE">
                            <button type="submit" class="btn-delete" style="border: none; cursor: pointer; padding: 5px 10px;">🗑️ Delete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${debts.empty}">
                    <td colspan="7" style="text-align: center;">No debts yet. Add your first debt!</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
