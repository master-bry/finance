<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Debts</title>
    
    <!-- Page-specific styles -->
    <th:block layout:fragment="styles">
        <style>
            .pagination {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 0.5rem;
                margin-top: 1.5rem;
                flex-wrap: wrap;
            }
            .pagination a, .pagination span {
                padding: 0.5rem 0.75rem;
                border-radius: 6px;
                text-decoration: none;
                background: var(--white);
                color: var(--primary-dark);
                border: 1px solid var(--gray-300);
                min-width: 2.5rem;
                text-align: center;
            }
            .pagination a:hover {
                background: var(--primary-dark);
                color: white;
            }
            .pagination .active {
                background: var(--primary-dark);
                color: white;
                font-weight: bold;
            }
            .pagination .disabled {
                opacity: 0.5;
                pointer-events: none;
            }
            .page-size-selector {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                margin-left: 1rem;
            }
            .page-size-selector select {
                padding: 0.4rem;
                border-radius: 6px;
                border: 1px solid var(--gray-300);
            }
        </style>
    </th:block>
</head>
<body>
    <div layout:fragment="content">
        <!-- Summary Cards -->
        <div class="summary-grid">
            <div class="summary-card">
                <div class="label">💰 Owed to Me</div>
                <div class="value green" th:text="${#numbers.formatDecimal(totalOwedToMe, 1, 0) + ' TZS'}">0 TZS</div>
            </div>
            <div class="summary-card">
                <div class="label">💸 I Owe</div>
                <div class="value red" th:text="${#numbers.formatDecimal(totalIOwe, 1, 0) + ' TZS'}">0 TZS</div>
            </div>
            <div class="summary-card">
                <div class="label">⚖️ Net Position</div>
                <div class="value" th:classappend="${netPosition >= 0 ? 'green' : 'red'}"
                     th:text="${#numbers.formatDecimal(netPosition, 1, 0) + ' TZS'}">0 TZS</div>
            </div>
            <div class="summary-card">
                <div class="label">📋 Total Records</div>
                <div class="value yellow" th:text="${totalItems}">0</div>
            </div>
        </div>

        <!-- Toolbar with Filters and Add Button -->
        <div class="toolbar">
            <a href="/debts/add" class="btn-add"><i class="fas fa-plus"></i> Add New Debt</a>
            <form method="get" action="/debts" style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
                <select name="type" style="padding:0.5rem; border-radius:8px; border:1px solid #D1D5DB;">
                    <option value="">All Types</option>
                    <option value="OWED_TO_ME" th:selected="${filterType == 'OWED_TO_ME'}">Owed to Me</option>
                    <option value="I_OWE" th:selected="${filterType == 'I_OWE'}">I Owe</option>
                </select>
                <select name="status" style="padding:0.5rem; border-radius:8px; border:1px solid #D1D5DB;">
                    <option value="">All Status</option>
                    <option value="PENDING" th:selected="${filterStatus == 'PENDING'}">Pending</option>
                    <option value="PARTIAL" th:selected="${filterStatus == 'PARTIAL'}">Partial</option>
                    <option value="SETTLED" th:selected="${filterStatus == 'SETTLED'}">Settled</option>
                </select>
                <button type="submit" class="btn-filter" style="padding:0.5rem 1rem;">Filter</button>
                <a href="/debts" class="btn-secondary" style="padding:0.5rem 1rem;">Reset</a>
                <div class="page-size-selector">
                    <label>Show:</label>
                    <select name="size" onchange="this.form.submit()">
                        <option value="5" th:selected="${pageSize == 5}">5</option>
                        <option value="10" th:selected="${pageSize == 10}">10</option>
                        <option value="20" th:selected="${pageSize == 20}">20</option>
                        <option value="50" th:selected="${pageSize == 50}">50</option>
                    </select>
                    <input type="hidden" name="page" value="0"/>
                </div>
            </form>
        </div>

        <!-- Table Card -->
        <div class="table-card">
            <div th:if="${debts == null or debts.empty}" class="empty-state">
                <i class="fas fa-hand-holding-usd"></i>
                <p>No debt records found.</p>
                <p><a href="/debts/add" style="color: var(--primary-dark);">Add your first record</a></p>
            </div>

            <table class="data-table" th:if="${debts != null and !debts.empty}">
                <thead>
                    <tr>
                        <th>Person</th>
                        <th>Type</th>
                        <th>Original</th>
                        <th>Remaining</th>
                        <th>Status</th>
                        <th>Due Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="debt : ${debts}">
                        <td>
                            <strong th:text="${debt.personName}">Person</strong>
                            <div th:if="${debt.phoneNumber}" style="font-size:0.78rem; color:#6B7280;" th:text="${debt.phoneNumber}"></div>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${debt.type == 'OWED_TO_ME' ? 'badge-owed' : 'badge-iowe'}"
                                  th:text="${debt.type == 'OWED_TO_ME' ? '💰 Owed to Me' : '💸 I Owe'}"></span>
                        </td>
                        <td th:text="${#numbers.formatDecimal(debt.amount, 1, 0) + ' TZS'}">0 TZS</td>
                        <td>
                            <strong th:text="${#numbers.formatDecimal(debt.remainingAmount, 1, 0) + ' TZS'}">0 TZS</strong>
                        </td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${debt.status == 'SETTLED' ? 'badge-settled' : (debt.status == 'PARTIAL' ? 'badge-partial' : 'badge-pending')}"
                                  th:text="${debt.status}">PENDING</span>
                        </td>
                        <td>
                            <span th:if="${debt.dueDate != null}"
                                  th:text="${#temporals.format(debt.dueDate, 'dd MMM yyyy')}"
                                  th:classappend="${debt.dueDate != null and debt.dueDate.isBefore(#temporals.createNow().toLocalDate()) and debt.status != 'SETTLED' ? 'overdue' : ''}"></span>
                            <span th:if="${debt.dueDate == null}" style="color:#D1D5DB;">—</span>
                        </td>
                        <td>
                            <div class="actions">
                                <a th:if="${debt.status != 'SETTLED'}"
                                   th:href="@{/debts/make-payment/{id}(id=${debt.id})}"
                                   class="btn-xs btn-payment" title="Record payment">
                                    <i class="fas fa-money-bill-wave"></i> Pay
                                </a>
                                <a th:href="@{/debts/edit/{id}(id=${debt.id})}"
                                   class="btn-xs btn-edit" title="Edit">
                                    <i class="fas fa-edit"></i> Edit
                                </a>
                                <button class="btn-xs btn-delete" title="Delete"
                                   onclick="confirmDelete('${debt.id}')">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <!-- Pagination -->
            <div th:if="${totalPages > 1}" class="pagination">
                <a th:href="@{/debts(page=0, size=${pageSize}, type=${filterType}, status=${filterStatus})}"
                   th:classappend="${currentPage == 0} ? 'disabled'">« First</a>
                <a th:href="@{/debts(page=${currentPage - 1}, size=${pageSize}, type=${filterType}, status=${filterStatus})}"
                   th:classappend="${currentPage == 0} ? 'disabled'">‹ Prev</a>
                
                <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a th:href="@{/debts(page=${i}, size=${pageSize}, type=${filterType}, status=${filterStatus})}"
                       th:text="${i + 1}"
                       th:classappend="${i == currentPage} ? 'active'"></a>
                </th:block>
                
                <a th:href="@{/debts(page=${currentPage + 1}, size=${pageSize}, type=${filterType}, status=${filterStatus})}"
                   th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">Next ›</a>
                <a th:href="@{/debts(page=${totalPages - 1}, size=${pageSize}, type=${filterType}, status=${filterStatus})}"
                   th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">Last »</a>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script th:inline="javascript">
            function confirmDelete(id) {
                showDeleteModal('Are you sure you want to delete this debt record?', function() {
                    window.location.href = '/debts/delete/' + id;
                });
            }
        </script>
    </th:block>
</body>
</html>
