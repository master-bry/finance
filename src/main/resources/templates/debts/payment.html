<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Make Payment - Finance Tracker</title>
</head>
<body>
    <div class="form-container">
        <h2><i class="fas fa-money-bill-wave"></i> Make Payment</h2>
        
        <div style="background: #F9FAFB; padding: 1rem; border-radius: 10px; margin-bottom: 1.5rem;">
            <p><strong>Person:</strong> <span th:text="${debt.personName}"></span></p>
            <p><strong>Original Amount:</strong> <span th:text="${#numbers.formatDecimal(debt.amount, 1, 2)}"></span> TZS</p>
            <p><strong>Remaining Balance:</strong> <span th:text="${#numbers.formatDecimal(debt.remainingAmount, 1, 2)}"></span> TZS</p>
        </div>
        
        <form th:action="@{/debts/make-payment/{id}(id=${debt.id})}" method="post">
            <div class="form-group">
                <label>Payment Amount *</label>
                <input type="number" step="0.01" name="amount" required th:max="${debt.remainingAmount}" placeholder="Enter amount">
            </div>
            
            <div class="form-group">
                <label>Notes</label>
                <textarea name="notes" rows="3"></textarea>
            </div>
            
            <button type="submit" class="btn-save" style="background: var(--success);">✅ Record Payment</button>
            <a href="/debts" class="btn-back" style="margin-left: 1rem;">Cancel</a>
        </form>
    </div>
</body>
</html>
