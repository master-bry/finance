<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Make Payment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #FFF6C0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        h1 { color: #2F6B3F; }
        .info-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #218838; }
        .back-link { margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Make Payment</h1>
        
        <div class="info-box">
            <p><strong>Person:</strong> <span th:text="${debt.personName}"></span></p>
            <p><strong>Original Amount:</strong> <span th:text="${debt.amount}"></span> TZS</p>
            <p><strong>Remaining Balance:</strong> <span th:text="${debt.remainingAmount}"></span> TZS</p>
        </div>
        
        <form th:action="@{/debts/make-payment/{id}(id=${debt.id})}" method="post">
            <div class="form-group">
                <label>Payment Amount *</label>
                <input type="number" step="0.01" name="amount" required 
                       th:max="${debt.remainingAmount}" placeholder="Enter amount">
            </div>
            
            <div class="form-group">
                <label>Notes</label>
                <textarea name="notes" rows="3" placeholder="Optional notes..."></textarea>
            </div>
            
            <button type="submit">✅ Record Payment</button>
        </form>
        
        <a href="/debts" class="back-link">← Back to Debts</a>
    </div>
</body>
</html>
