<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Make Payment</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="form-container">
            <h2 style="color: var(--primary-dark); margin-bottom: 0.3rem;">💰 Payment Details</h2>
            <p style="color: var(--gray-500); margin-bottom: 1.5rem;">Record a payment against this debt</p>
            
            <div class="debt-info">
                <p><strong>Person:</strong> <span th:text="${debt.personName}"></span></p>
                <p><strong>Type:</strong> <span th:text="${debt.type == 'OWED_TO_ME' ? 'Owed to Me' : 'I Owe'}"></span></p>
                <p><strong>Original Amount:</strong> <span th:text="${#numbers.formatDecimal(debt.amount, 1, 0)} + ' TZS'"></span></p>
                <p><strong>Remaining Balance:</strong> 
                    <span class="remaining-highlight" th:text="${#numbers.formatDecimal(debt.remainingAmount, 1, 0)} + ' TZS'"></span>
                </p>
            </div>
            
            <form th:action="@{/debts/make-payment/{id}(id=${debt.id})}" method="post">
                <div class="form-group">
                    <label for="amount">Payment Amount (TZS) *</label>
                    <input type="number" step="0.01" id="amount" name="amount" required 
                           th:max="${debt.remainingAmount}" placeholder="Enter amount" min="0.01">
                </div>
                <div class="form-group">
                    <label for="notes">Notes (optional)</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="e.g., Cash payment, Bank transfer..."></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-success"><i class="fas fa-check-circle"></i> Record Payment</button>
                    <a href="/debts" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
