<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Payment - Finance Tracker</title>
    <style>
        :root {
            --primary-dark: #2F6B3F;
            --secondary: #7FB77E;
            --accent: #F7C85C;
            --background: #FFF6C0;
            --white: #FFFFFF;
            --success: #10B981;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--background);
            min-height: 100vh;
        }
        
        .navbar {
            background: var(--primary-dark);
            color: white;
            padding: 1rem 2rem;
        }
        
        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: var(--accent); }
        
        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .form-container {
            background: var(--white);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        
        h1 {
            color: var(--primary-dark);
            margin-bottom: 1.5rem;
        }
        
        .debt-info {
            background: #F9FAFB;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
        
        .debt-info p {
            margin: 0.5rem 0;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #374151;
            font-weight: 500;
        }
        
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }
        
        .btn-primary {
            background: var(--success);
            color: white;
        }
        
        .btn-secondary {
            background: #9CA3AF;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">💰 Finance<span>Tracker</span></div>
        </div>
    </nav>
    
    <div class="container">
        <div class="form-container">
            <h1>💰 Make Payment</h1>
            
            <div class="debt-info">
                <p><strong>Person:</strong> <span th:text="${debt.personName}"></span></p>
                <p><strong>Original Amount:</strong> <span th:text="${debt.amount}"></span> TZS</p>
                <p><strong>Remaining Balance:</strong> <span th:text="${debt.remainingAmount}"></span> TZS</p>
            </div>
            
            <form th:action="@{/debts/make-payment/{id}(id=${debt.id})}" method="post">
                <div class="form-group">
                    <label for="amount">Payment Amount *</label>
                    <input type="number" step="0.01" id="amount" name="amount" required 
                           th:max="${debt.remainingAmount}" placeholder="Enter amount">
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="Optional notes about this payment..."></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">✅ Record Payment</button>
                    <a href="/debts" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
