<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Update Investment Value</title>
    <th:block layout:fragment="styles">
        <style>
            .error-message { color: var(--danger); font-size: 0.85rem; margin-top: 0.25rem; }
            .is-invalid { border-color: var(--danger) !important; }
        </style>
    </th:block>
</head>
<body>
    <div layout:fragment="content">
        <div class="form-container">
            <h2 style="color: var(--primary-dark); margin-bottom: 1.5rem;">📈 Update Investment Value</h2>
            
            <div class="debt-info">
                <p><strong>Investment:</strong> <span th:text="${investment.name}"></span></p>
                <p><strong>Current Value:</strong> <span th:text="${#numbers.formatDecimal(investment.currentValue, 1, 0)}"></span> TZS</p>
                <p><strong>Amount Invested:</strong> <span th:text="${#numbers.formatDecimal(investment.amountInvested, 1, 0)}"></span> TZS</p>
            </div>
            
            <form id="updateValueForm" th:action="@{/investments/update-value/{id}(id=${investment.id})}" method="post" novalidate>
                <div class="form-group">
                    <label for="currentValue">New Current Value *</label>
                    <input type="number" step="0.01" id="currentValue" name="currentValue" placeholder="Enter new value" min="0">
                    <div class="error-message" data-error-for="currentValue"></div>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-success">💾 Update Value</button>
                    <a href="/investments" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    
    <th:block layout:fragment="scripts">
        <script>
            document.getElementById('updateValueForm').addEventListener('submit', function(e) {
                const valueInput = document.getElementById('currentValue');
                const value = parseFloat(valueInput.value);
                
                document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
                valueInput.classList.remove('is-invalid');
                
                if (!valueInput.value || isNaN(value) || value < 0) {
                    e.preventDefault();
                    valueInput.classList.add('is-invalid');
                    document.querySelector('[data-error-for="currentValue"]').textContent = 'Please enter a valid positive amount';
                    showErrorToast('Please enter a valid amount');
                }
            });
        </script>
    </th:block>
</body>
</html>
