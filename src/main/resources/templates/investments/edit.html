<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Investment - Finance Tracker</title>
    <style>
        /* Same styles as add.html */
        :root {
            --primary-dark: #2F6B3F;
            --secondary: #7FB77E;
            --accent: #F7C85C;
            --background: #FFF6C0;
            --white: #FFFFFF;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--background);
            min-height: 100vh;
        }
        
        .navbar {
            background: var(--primary-dark);
            color: white;
            padding: 1rem 2rem;
        }
        
        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: var(--accent); }
        
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .form-container {
            background: var(--white);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        
        h1 { color: var(--primary-dark); margin-bottom: 1.5rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #374151;
            font-weight: 500;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }
        
        .btn-primary { background: var(--primary-dark); color: white; }
        .btn-primary:hover { background: var(--secondary); }
        .btn-secondary { background: #9CA3AF; color: white; }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        @media (max-width: 640px) {
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">💰 Finance<span>Tracker</span></div>
            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/transactions">Transactions</a>
                <a href="/debts">Debts</a>
                <a href="/investments">Investments</a>
                <a href="/goals">Goals</a>
                <a href="/budget">Budget</a>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="form-container">
            <h1>✏️ Edit Investment</h1>
            
            <form action="#" th:action="@{/investments/edit/{id}(id=${investment.id})}" th:object="${investment}" method="post">
                <div class="form-group">
                    <label for="name">Investment Name *</label>
                    <input type="text" id="name" th:field="*{name}" required>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="type">Type *</label>
                        <select id="type" th:field="*{type}" required>
                            <option value="STOCKS">📊 Stocks</option>
                            <option value="REAL_ESTATE">🏠 Real Estate</option>
                            <option value="BUSINESS">💼 Business</option>
                            <option value="SAVINGS">🏦 Savings</option>
                            <option value="CRYPTO">₿ Crypto</option>
                            <option value="OTHER">📌 Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="riskLevel">Risk Level</label>
                        <select id="riskLevel" th:field="*{riskLevel}">
                            <option value="LOW">Low Risk</option>
                            <option value="MEDIUM">Medium Risk</option>
                            <option value="HIGH">High Risk</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="amountInvested">Amount Invested</label>
                        <input type="number" step="0.01" id="amountInvested" th:field="*{amountInvested}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="currentValue">Current Value</label>
                        <input type="number" step="0.01" id="currentValue" th:field="*{currentValue}">
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="expectedReturn">Expected Return (%)</label>
                        <input type="number" step="0.01" id="expectedReturn" th:field="*{expectedReturn}">
                    </div>
                    
                    <div class="form-group">
                        <label for="provider">Provider</label>
                        <input type="text" id="provider" th:field="*{provider}">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" th:field="*{notes}" rows="3"></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">💾 Save Changes</button>
                    <a href="/investments" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
