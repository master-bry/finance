<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Add Investment</title>
    <th:block layout:fragment="styles">
        <style>
            .error-message { color: var(--danger); font-size: 0.85rem; margin-top: 0.25rem; }
            .is-invalid { border-color: var(--danger) !important; }
        </style>
    </th:block>
</head>
<body>
    <div layout:fragment="content">
        <div class="form-container">
            <h2 style="color: var(--primary-dark); margin-bottom: 1.5rem;">📈 Add New Investment</h2>
            
            <form id="investmentForm" th:action="@{/investments/add}" th:object="${investment}" method="post" novalidate>
                <div class="form-group">
                    <label for="name">Investment Name *</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="e.g., ABC Company Shares">
                    <div class="error-message" data-error-for="name"></div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="type">Type *</label>
                        <select id="type" th:field="*{type}">
                            <option value="">Select type</option>
                            <option value="STOCKS">📊 Stocks</option>
                            <option value="REAL_ESTATE">🏠 Real Estate</option>
                            <option value="BUSINESS">💼 Business</option>
                            <option value="SAVINGS">🏦 Savings Account</option>
                            <option value="CRYPTO">₿ Cryptocurrency</option>
                            <option value="OTHER">📌 Other</option>
                        </select>
                        <div class="error-message" data-error-for="type"></div>
                    </div>
                    <div class="form-group">
                        <label for="riskLevel">Risk Level</label>
                        <select id="riskLevel" th:field="*{riskLevel}">
                            <option value="LOW">🟢 Low Risk</option>
                            <option value="MEDIUM">🟡 Medium Risk</option>
                            <option value="HIGH">🔴 High Risk</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="amountInvested">Amount Invested *</label>
                        <input type="number" step="0.01" id="amountInvested" th:field="*{amountInvested}" placeholder="0.00" min="0.01">
                        <div class="error-message" data-error-for="amountInvested"></div>
                    </div>
                    <div class="form-group">
                        <label for="currentValue">Current Value</label>
                        <input type="number" step="0.01" id="currentValue" th:field="*{currentValue}" placeholder="0.00" min="0">
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="expectedReturn">Expected Return (%)</label>
                        <input type="number" step="0.01" id="expectedReturn" th:field="*{expectedReturn}" placeholder="e.g., 10.5">
                    </div>
                    <div class="form-group">
                        <label for="provider">Provider/Bank</label>
                        <input type="text" id="provider" th:field="*{provider}" placeholder="e.g., NMB Bank">
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="startDate">Start Date</label>
                        <input type="date" id="startDate" th:field="*{startDate}">
                    </div>
                    <div class="form-group">
                        <label for="maturityDate">Maturity Date</label>
                        <input type="date" id="maturityDate" th:field="*{maturityDate}">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" th:field="*{notes}" rows="3" placeholder="Any additional information..."></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">💾 Save Investment</button>
                    <a href="/investments" class="btn btn-secondary">❌ Cancel</a>
                </div>
            </form>
        </div>
    </div>
    
    <th:block layout:fragment="scripts">
        <script>
            document.getElementById('investmentForm').addEventListener('submit', function(e) {
                let isValid = true;
                const name = document.getElementById('name');
                const type = document.getElementById('type');
                const amount = document.getElementById('amountInvested');
                
                // Clear previous errors
                document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
                document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
                
                // Validate name
                if (!name.value.trim()) {
                    showFieldError(name, 'Investment name is required');
                    isValid = false;
                }
                
                // Validate type
                if (!type.value) {
                    showFieldError(type, 'Please select an investment type');
                    isValid = false;
                }
                
                // Validate amount
                const amountValue = parseFloat(amount.value);
                if (!amount.value || isNaN(amountValue) || amountValue <= 0) {
                    showFieldError(amount, 'Amount must be a positive number');
                    isValid = false;
                }
                
                // Validate current value if provided
                const currentValue = document.getElementById('currentValue');
                if (currentValue.value) {
                    const cv = parseFloat(currentValue.value);
                    if (isNaN(cv) || cv < 0) {
                        showFieldError(currentValue, 'Current value must be a positive number');
                        isValid = false;
                    }
                }
                
                // Validate expected return if provided
                const expectedReturn = document.getElementById('expectedReturn');
                if (expectedReturn.value) {
                    const er = parseFloat(expectedReturn.value);
                    if (isNaN(er)) {
                        showFieldError(expectedReturn, 'Expected return must be a valid number');
                        isValid = false;
                    }
                }
                
                if (!isValid) {
                    e.preventDefault();
                    showErrorToast('Please fix the errors before submitting.');
                }
            });
            
            function showFieldError(field, message) {
                field.classList.add('is-invalid');
                const errorDiv = field.closest('.form-group').querySelector('.error-message');
                if (errorDiv) errorDiv.textContent = message;
            }
        </script>
    </th:block>
</body>
</html>
