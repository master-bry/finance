<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Investments</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">💰 Total Invested</div>
                <div class="stat-value" th:text="${#numbers.formatDecimal(totalInvested, 1, 0)} + ' TZS'">0 TZS</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">📈 Current Value</div>
                <div class="stat-value" th:text="${#numbers.formatDecimal(totalCurrentValue, 1, 0)} + ' TZS'">0 TZS</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">📊 Total Profit/Loss</div>
                <div class="stat-value" th:class="${totalProfitLoss >= 0 ? 'positive' : 'negative'}">
                    <span th:text="${#numbers.formatDecimal(totalProfitLoss, 1, 0)}"></span> TZS
                </div>
            </div>
        </div>
        
        <a href="/investments/add" class="btn-add">📈 Add New Investment</a>
        
        <div th:each="inv : ${investments}" class="investment-card">
            <div class="investment-header">
                <span class="investment-name" th:text="${inv.name}"></span>
                <div>
                    <span class="investment-type" th:text="${inv.type}"></span>
                    <span class="profit-badge" th:class="${inv.profitLoss >= 0 ? 'profit-positive' : 'profit-negative'}" 
                          th:text="${#numbers.formatDecimal(inv.profitLossPercentage, 1, 1)} + '%'"></span>
                </div>
            </div>
            
            <div class="investment-details">
                <div class="investment-detail">
                    <strong>Invested:</strong> <span th:text="${#numbers.formatDecimal(inv.amountInvested, 1, 0)}"></span> TZS
                </div>
                <div class="investment-detail">
                    <strong>Current Value:</strong> <span th:text="${#numbers.formatDecimal(inv.currentValue, 1, 0)}"></span> TZS
                </div>
                <div class="investment-detail">
                    <strong>Profit/Loss:</strong> <span th:class="${inv.profitLoss >= 0 ? 'positive' : 'negative'}" 
                          th:text="${#numbers.formatDecimal(inv.profitLoss, 1, 0)}"></span> TZS
                </div>
                <div class="investment-detail">
                    <strong>Risk Level:</strong> <span th:text="${inv.riskLevel}"></span>
                </div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" th:style="'width: ' + ${(inv.currentValue / inv.amountInvested) * 100} + '%;'"></div>
            </div>
            
            <div class="investment-actions">
                <a th:href="'/investments/update-value/' + ${inv.id}" class="btn-xs btn-update">💰 Update Value</a>
                <a th:href="'/investments/add-transaction/' + ${inv.id}" class="btn-xs btn-transaction">📝 Add Transaction</a>
                <a th:href="'/investments/edit/' + ${inv.id}" class="btn-xs btn-edit">✏️ Edit</a>
                <a th:href="'/investments/delete/' + ${inv.id}" class="btn-xs btn-delete" onclick="return confirm('Are you sure?')">🗑️ Delete</a>
            </div>
        </div>
        
        <div th:if="${investments.empty}" class="empty-state">
            <i class="fas fa-chart-line"></i>
            <p>No investments recorded yet.</p>
            <p><a href="/investments/add" style="color: var(--primary-dark);">Click here</a> to add your first investment.</p>
        </div>
    </div>
</body>
</html>
