<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 – Server Error | Finance Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --navy-900: #0F1A2E; --navy-800: #1B2A4A; --teal-500: #0d9488;
            --danger: #EF4444; --white: #FFFFFF; --gray-400: #94A3B8; --gray-500: #64748B;
            --gray-700: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1e293b 50%, #0F172A 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(239, 68, 68, 0.05) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(13, 148, 136, 0.04) 0%, transparent 50%);
            pointer-events: none;
        }
        .error-card {
            background: var(--white);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        .error-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--navy-800), var(--danger), #f59e0b);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .error-icon i { font-size: 2.2rem; color: var(--danger); }
        .error-code {
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--navy-800), var(--danger));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0.25rem;
            letter-spacing: -2px;
        }
        .error-card h2 {
            color: #0f172a;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }
        .error-card p {
            color: var(--gray-500);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn-group { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
        .btn-primary, .btn-secondary {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white;
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 41, 59, 0.35);
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #334155;
            border: 1px solid #e2e8f0;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
        }
        @media (max-width: 480px) {
            .error-card { padding: 2rem 1.5rem; }
            .error-code { font-size: 3.5rem; }
            .btn-group { flex-direction: column; }
            .btn-primary, .btn-secondary { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <div class="error-code">500</div>
        <h2>Internal Server Error</h2>
        <p>Something went wrong on our end. Our engineers have been notified. Please try again shortly.</p>
        <div class="btn-group">
            <a href="/dashboard" class="btn-primary"><i class="fas fa-home"></i> Dashboard</a>
            <a href="javascript:location.reload()" class="btn-secondary"><i class="fas fa-sync-alt"></i> Try Again</a>
        </div>
    </div>
</body>
</html>
