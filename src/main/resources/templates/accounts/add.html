<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Add Account</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="form-container">
            <h2 style="color: var(--primary-dark); margin-bottom: 1.5rem;">Add Bank Account</h2>

            <form action="#" th:action="@{/accounts/add}" th:object="${account}" method="post">
                <div class="form-group">
                    <label for="name">Account Name *</label>
                    <input type="text" id="name" th:field="*{name}" required placeholder="e.g. CRDB Savings">
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="type">Account Type</label>
                        <select id="type" th:field="*{type}">
                            <option value="">Select type...</option>
                            <option value="CHECKING">Checking</option>
                            <option value="SAVINGS">Savings</option>
                            <option value="CREDIT_CARD">Credit Card</option>
                            <option value="CASH">Cash</option>
                            <option value="MOBILE_MONEY">Mobile Money</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="currency">Currency</label>
                        <select id="currency" th:field="*{currency}">
                            <option value="TZS">TZS</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                            <option value="KES">KES</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="bankName">Bank Name</label>
                        <input type="text" id="bankName" th:field="*{bankName}" placeholder="e.g. CRDB Bank">
                    </div>
                    <div class="form-group">
                        <label for="accountNumber">Account Number</label>
                        <input type="text" id="accountNumber" th:field="*{accountNumber}" placeholder="Last 4 digits visible">
                    </div>
                </div>

                <div class="form-group">
                    <label for="balance">Opening Balance</label>
                    <input type="number" step="0.01" id="balance" th:field="*{balance}" placeholder="0.00">
                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" th:field="*{notes}" rows="2"></textarea>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Account</button>
                    <a href="/accounts" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
