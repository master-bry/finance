<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Edit Bill</title>
</head>
<body>
<div layout:fragment="content">
    <div class="form-container">
        <h2 style="color: var(--primary-dark); margin-bottom: 1.5rem;">✏️ Edit Bill</h2>
        <form th:action="@{/bills/edit/{id}(id=${bill.id})}" th:object="${bill}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="redirectTo" th:value="${param.redirectTo != null ? param.redirectTo : '/bills'}" />

            <div class="form-group">
                <label>Bill Name *</label>
                <input type="text" th:field="*{name}" required>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Amount (TZS) *</label>
                    <input type="number" step="0.01" th:field="*{amount}" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select th:field="*{category}">
                        <option value="Rent">🏠 Rent</option>
                        <option value="Utilities">💡 Utilities</option>
                        <option value="Internet">🌐 Internet</option>
                        <option value="Insurance">🛡️ Insurance</option>
                        <option value="Subscription">📺 Subscription</option>
                        <option value="Other">📌 Other</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Due Date *</label>
                    <input type="date" th:field="*{dueDate}" required>
                </div>
                <div class="form-group">
                    <label>Recurring?</label>
                    <select th:field="*{recurring}" onchange="toggleFrequency(this.value)">
                        <option value="false">No</option>
                        <option value="true">Yes</option>
                    </select>
                </div>
            </div>
            <div class="row" id="frequencyRow" style="display: none;">
                <div class="form-group">
                    <label>Frequency</label>
                    <select th:field="*{frequency}">
                        <option value="MONTHLY">Monthly</option>
                        <option value="WEEKLY">Weekly</option>
                        <option value="YEARLY">Yearly</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select th:field="*{status}">
                    <option value="PENDING">Pending</option>
                    <option value="PARTIAL">Partial</option>
                    <option value="PAID">Paid</option>
                </select>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea th:field="*{notes}" rows="2"></textarea>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Update Bill</button>
                <a th:href="@{/bills}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
    function toggleFrequency(val) {
        document.getElementById('frequencyRow').style.display = val === 'true' ? 'block' : 'none';
    }
    window.onload = function() {
        const recurring = document.querySelector('[th\\:field="*{recurring}"]');
        if (recurring) toggleFrequency(recurring.value);
    };
</script>
</body>
</html>
