<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Add Bill</title>
</head>
<body>
<div layout:fragment="content">
    <div class="form-container">
        <h2 style="color: var(--primary-dark); margin-bottom: 1.5rem;"><i class="fas fa-plus"></i> Add New Bill</h2>
        <form th:action="@{/bills/add}" th:object="${bill}" method="post">
            <div class="form-group">
                <label>Bill Name *</label>
                <input type="text" th:field="*{name}" placeholder="e.g., Rent, Electricity, Internet" required>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Amount (TZS) *</label>
                    <input type="number" step="0.01" th:field="*{amount}" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select th:field="*{category}">
                        <option value="food">🍔 Food</option>
                        <option value="Rent">🏠 Rent</option>
                        <option value="Utilities">💡 Utilities</option>
                        <option value="Internet">🌐 Internet</option>
                        <option value="Insurance">🛡️ Insurance</option>
                        <option value="Subscription">📺 Subscription</option>
                        <option value="Other">📌 Other</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Due Date *</label>
                    <input type="date" th:field="*{dueDate}" required>
                </div>
                <div class="form-group">
                    <label>Recurring?</label>
                    <select th:field="*{recurring}" onchange="toggleFrequency(this.value)">
                        <option value="false">No</option>
                        <option value="true">Yes</option>
                    </select>
                </div>
            </div>
            <div class="row" id="frequencyRow" style="display: none;">
                <div class="form-group">
                    <label>Frequency</label>
                    <select th:field="*{frequency}">
                        <option value="MONTHLY">Monthly</option>
                        <option value="WEEKLY">Weekly</option>
                        <option value="YEARLY">Yearly</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea th:field="*{notes}" rows="2"></textarea>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Save Bill</button>
                <a href="/bills" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
    function toggleFrequency(val) {
        document.getElementById('frequencyRow').style.display = val === 'true' ? 'block' : 'none';
    }
    // set initial state
    window.onload = function() {
        const recurring = document.querySelector('[th\\:field="*{recurring}"]');
        if (recurring) toggleFrequency(recurring.value);
    };
</script>
</body>
</html>
