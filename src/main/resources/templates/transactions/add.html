<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Add Transaction</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="form-container">
            <h2 style="color: var(--primary-dark); margin-bottom: 0.3rem;">💳 Transaction Details</h2>
            <p style="color: var(--gray-500); margin-bottom: 1.5rem;">Fill in the details below to record a new transaction</p>

            <form action="#" th:action="@{/transactions/add}" th:object="${transaction}" method="post">
                <div class="form-group">
                    <label for="description">Description *</label>
                    <input type="text" id="description" th:field="*{description}" required
                           placeholder="e.g., Grocery shopping, Salary, Rent">
                    <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error-message"></div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="amount">Amount (TZS) *</label>
                        <input type="number" step="0.01" id="amount" th:field="*{amount}" required
                               placeholder="0.00" min="0.01">
                        <div th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label for="type">Type *</label>
                        <select id="type" th:field="*{type}" required>
                            <option value="">Select type</option>
                            <option value="INCOME">💰 Income</option>
                            <option value="EXPENSE">💸 Expense</option>
                        </select>
                        <div th:if="${#fields.hasErrors('type')}" th:errors="*{type}" class="error-message"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <input type="text" id="category" th:field="*{category}" required
                           placeholder="e.g., Food, Salary, Rent" list="category-list">
                    <datalist id="category-list">
                        <option value="Food &amp; Dining">
                        <option value="Rent &amp; Utilities">
                        <option value="Salary">
                        <option value="Shopping">
                        <option value="Entertainment">
                        <option value="Transportation">
                        <option value="Healthcare">
                        <option value="Education">
                        <option value="Investment">
                        <option value="Other">
                    </datalist>
                    <div class="input-hint">Choose or type a custom category</div>
                    <div th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="notes">Notes (optional)</label>
                    <textarea id="notes" th:field="*{notes}" rows="3"
                              placeholder="Additional notes about this transaction..."></textarea>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Transaction</button>
                    <a href="/transactions" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
