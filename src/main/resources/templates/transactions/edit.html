<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Transaction - Finance Tracker</title>
</head>
<body>
    <div class="form-container">
        <h2><i class="fas fa-edit"></i> Edit Transaction</h2>
        
        <form action="#" th:action="@{/transactions/edit/{id}(id=${transaction.id})}" th:object="${transaction}" method="post">
            <div class="form-group">
                <label>Description *</label>
                <input type="text" th:field="*{description}" required>
            </div>
            
            <div class="form-group">
                <label>Amount *</label>
                <input type="number" step="0.01" th:field="*{amount}" required>
            </div>
            
            <div class="form-group">
                <label>Type *</label>
                <select th:field="*{type}" required>
                    <option value="INCOME">💰 Income</option>
                    <option value="EXPENSE">💸 Expense</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Category *</label>
                <input type="text" th:field="*{category}" required>
            </div>
            
            <div class="form-group">
                <label>Notes</label>
                <textarea th:field="*{notes}" rows="3"></textarea>
            </div>
            
            <button type="submit" class="btn-save">💾 Save Changes</button>
            <a href="/transactions" class="btn-back" style="margin-left: 1rem;">Cancel</a>
        </form>
    </div>
</body>
</html>
