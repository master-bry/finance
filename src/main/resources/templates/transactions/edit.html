<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Edit Transaction</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="form-container">
            <h2 style="color: var(--primary-dark); margin-bottom: 1.5rem;">✏️ Edit Transaction</h2>

            <form action="#" th:action="@{/transactions/edit/{id}(id=${transaction.id})}"
                  th:object="${transaction}" method="post">
                <div class="form-group">
                    <label for="description">Description *</label>
                    <input type="text" id="description" th:field="*{description}" required>
                    <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error-message"></div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="amount">Amount (TZS) *</label>
                        <input type="number" step="0.01" id="amount" th:field="*{amount}" required min="0.01">
                        <div th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label for="type">Type *</label>
                        <select id="type" th:field="*{type}" required>
                            <option value="INCOME">💰 Income</option>
                            <option value="EXPENSE">💸 Expense</option>
                        </select>
                        <div th:if="${#fields.hasErrors('type')}" th:errors="*{type}" class="error-message"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <input type="text" id="category" th:field="*{category}" required list="category-list">
                    <datalist id="category-list">
                        <option value="Food &amp; Dining">
                        <option value="Rent &amp; Utilities">
                        <option value="Salary">
                        <option value="Shopping">
                        <option value="Entertainment">
                        <option value="Transportation">
                        <option value="Healthcare">
                        <option value="Education">
                        <option value="Investment">
                        <option value="Other">
                    </datalist>
                    <div th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" th:field="*{notes}" rows="3"></textarea>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                    <a href="/transactions" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
