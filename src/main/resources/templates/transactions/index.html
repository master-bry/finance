<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transactions - Finance Tracker</title>
</head>
<body>
    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-title">💰 Total Income</div>
            <div class="stat-value positive">
                <span th:text="${#numbers.formatDecimal(totalIncome, 1, 2)}"></span> TZS
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-title">💸 Total Expenses</div>
            <div class="stat-value negative">
                <span th:text="${#numbers.formatDecimal(totalExpense, 1, 2)}"></span> TZS
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-title">💵 Balance</div>
            <div class="stat-value" th:class="${balance >= 0 ? 'positive' : 'negative'}">
                <span th:text="${#numbers.formatDecimal(balance, 1, 2)}"></span> TZS
            </div>
        </div>
    </div>
    
    <a href="/transactions/add" class="btn-add"><i class="fas fa-plus"></i> Add Transaction</a>
    
    <div class="section-card">
        <div class="section-header">
            <h4><i class="fas fa-list"></i> All Transactions</h4>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Type</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${transactions}">
                    <td th:text="${#temporals.format(t.date, 'yyyy-MM-dd HH:mm')}">Date</td>
                    <td th:text="${t.description}">Description</td>
                    <td th:text="${t.category}">Category</td>
                    <td th:class="${t.type == 'INCOME' ? 'positive' : 'negative'}" 
                        th:text="${#numbers.formatDecimal(t.amount, 1, 2)} + ' TZS'">Amount</td>
                    <td>
                        <span th:if="${t.type == 'INCOME'}" style="color: var(--success);">💰 Income</span>
                        <span th:if="${t.type == 'EXPENSE'}" style="color: var(--danger);">💸 Expense</span>
                    </td>
                    <td>
                        <a th:href="'/transactions/edit/' + ${t.id}" class="btn-sm" style="background: #3B82F6;">Edit</a>
                        <a th:href="'/transactions/delete/' + ${t.id}" class="btn-sm" style="background: var(--danger);" 
                           onclick="return confirm('Delete this transaction?')">Delete</a>
                    </td>
                </tr>
                <tr th:if="${transactions.empty}">
                    <td colspan="6" style="text-align: center;">No transactions yet. <a href="/transactions/add">Add your first transaction!</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
