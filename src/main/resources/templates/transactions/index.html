<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transactions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #FFF6C0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        h1 { color: #2F6B3F; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #2F6B3F; color: white; }
        .btn-add {
            background: #2F6B3F;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .income { color: green; }
        .expense { color: red; }
        .delete-btn { color: red; text-decoration: none; }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            flex: 1;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: bold; }
        .positive { color: green; }
        .negative { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Transactions</h1>
        <a href="/transactions/add" class="btn-add">➕ Add Transaction</a>
        <a href="/dashboard" style="margin-left: 10px;">← Back to Dashboard</a>
        
        <div class="stats">
            <div class="stat-card">
                <div>Total Income</div>
                <div class="stat-value positive" th:text="${stats.totalIncome} + ' TZS'">0</div>
            </div>
            <div class="stat-card">
                <div>Total Expense</div>
                <div class="stat-value negative" th:text="${stats.totalExpense} + ' TZS'">0</div>
            </div>
            <div class="stat-card">
                <div>Balance</div>
                <div class="stat-value" th:class="${stats.balance >= 0 ? 'positive' : 'negative'}" 
                     th:text="${stats.balance} + ' TZS'">0</div>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Type</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${transactions}">
                    <td th:text="${t.formattedDate}">Date</td>
                    <td th:text="${t.description}">Desc</td>
                    <td th:text="${t.category}">Category</td>
                    <td th:class="${t.type == 'INCOME' ? 'income' : 'expense'}" 
                        th:text="${t.amount} + ' TZS'">Amount</td>
                    <td th:text="${t.type}">Type</td>
                    <td><a th:href="'/transactions/delete/' + ${t.id}" class="delete-btn" 
                           onclick="return confirm('Delete this transaction?')">Delete</a></td>
                </tr>
                <tr th:if="${transactions.empty}">
                    <td colspan="6" style="text-align: center;">No transactions yet. Add your first transaction!</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
