<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Transactions</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="header-section">
            <h1><i class="fas fa-exchange-alt"></i> All Transactions</h1>
            <!-- <a href="/transactions/add" class="btn btn-primary">➕ Add Transaction</a> -->
        </div>
        
        <!-- Summary Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">💰 Total Income</div>
                <div class="stat-value positive" th:text="${#numbers.formatDecimal(stats.totalIncome, 1, 0)} + ' TZS'">0 TZS</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">💸 Total Expense</div>
                <div class="stat-value negative" th:text="${#numbers.formatDecimal(stats.totalExpense, 1, 0)} + ' TZS'">0 TZS</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">💵 Balance</div>
                <div class="stat-value" th:class="${stats.balance >= 0 ? 'positive' : 'negative'}"
                     th:text="${#numbers.formatDecimal(stats.balance, 1, 0)} + ' TZS'">0 TZS</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">📊 Total Count</div>
                <div class="stat-value" th:text="${stats.transactionCount}">0</div>
            </div>
        </div>
        
        <!-- Search and Filter -->
        <div class="filter-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search by description or category..." onkeyup="searchTransactions()">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterType('all')">All</button>
                <button class="filter-btn" onclick="filterType('INCOME')">Income</button>
                <button class="filter-btn" onclick="filterType('EXPENSE')">Expense</button>
            </div>
        </div>
        
        <!-- Transactions Table -->
        <div class="table-card">
            <table class="data-table" id="transactionsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Type</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="trans : ${transactions}" th:attr="data-type=${trans.type}">
                        <td th:text="${#temporals.format(trans.date, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${trans.description}"></td>
                        <td><span class="category-badge" th:text="${trans.category}"></span></td>
                        <td th:class="${trans.type == 'INCOME' ? 'positive' : 'negative'}">
                            <span th:if="${trans.type == 'INCOME'}">+</span>
                            <span th:if="${trans.type == 'EXPENSE'}">-</span>
                            <span th:text="${#numbers.formatDecimal(trans.amount, 1, 0)}"></span> TZS
                        </td>
                        <td>
                            <span th:if="${trans.type == 'INCOME'}" class="badge badge-income">💰 Income</span>
                            <span th:if="${trans.type == 'EXPENSE'}" class="badge badge-expense">💸 Expense</span>
                        </td>
                        <td>
                            <div class="actions">
                                <a th:href="'/transactions/edit/' + ${trans.id}" class="btn-xs btn-edit">✏️ Edit</a>
                                <a th:href="'/transactions/delete/' + ${trans.id}" class="btn-xs btn-delete" 
                                   onclick="return confirm('Are you sure?')">🗑️ Delete</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${transactions.empty}">
                        <td colspan="6">
                            <div class="empty-state">
                                <i class="fas fa-receipt"></i>
                                <p>No transactions found. <a href="/transactions/add" style="color: var(--primary-dark);">Add your first transaction!</a></p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <th:block layout:fragment="scripts">
        <script>
            let currentFilter = 'all';
            
            function filterType(type) {
                currentFilter = type;
                const rows = document.querySelectorAll('#transactionsTable tbody tr');
                rows.forEach(row => {
                    if (row.cells && row.cells.length > 0) {
                        const transactionType = row.getAttribute('data-type');
                        if (type === 'all' || transactionType === type) {
                            row.style.display = '';
                        } else {
                            row.style.display = 'none';
                        }
                    }
                });
                
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
            }
            
            function searchTransactions() {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const rows = document.querySelectorAll('#transactionsTable tbody tr');
                
                rows.forEach(row => {
                    if (row.cells && row.cells.length > 0) {
                        const description = row.cells[1]?.textContent.toLowerCase() || '';
                        const category = row.cells[2]?.textContent.toLowerCase() || '';
                        const matches = description.includes(searchTerm) || category.includes(searchTerm);
                        
                        if (matches && (currentFilter === 'all' || row.getAttribute('data-type') === currentFilter)) {
                            row.style.display = '';
                        } else {
                            row.style.display = 'none';
                        }
                    }
                });
            }
        </script>
    </th:block>
</body>
</html>
