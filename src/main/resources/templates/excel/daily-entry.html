<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Daily Entry</title>
    
    <th:block layout:fragment="styles">
        <style>
            .btn-submit {
                background: var(--primary-dark);
                color: white;
                padding: 0.75rem 1.5rem;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                width: 100%;
                font-weight: 600;
            }
            
            .btn-submit:hover {
                background: var(--secondary);
            }
            
            .entry-list {
                background: var(--white);
                border-radius: 15px;
                padding: 1.5rem;
                margin-bottom: 1.5rem;
            }
            
            .entry-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.75rem;
                border-bottom: 1px solid var(--gray-200);
            }
            
            .entry-item:last-child {
                border-bottom: none;
            }
            
            .delete-btn {
                color: var(--danger);
                text-decoration: none;
                margin-left: 1rem;
            }
            
            .form-title {
                font-size: 1.2rem;
                margin-bottom: 1rem;
                color: var(--primary-dark);
                border-left: 4px solid var(--accent);
                padding-left: 0.75rem;
            }
            
            .income {
                color: var(--success);
            }
            
            .expense {
                color: var(--danger);
            }
        </style>
    </th:block>
</head>
<body>
    <div layout:fragment="content">
        <!-- Current Balance -->
        <div class="balance-card">
            <div><i class="fas fa-wallet"></i> Current Balance</div>
            <div class="balance-amount"><span th:text="${#numbers.formatDecimal(currentBalance, 1, 0)}"></span> TZS</div>
            <div th:text="${#temporals.format(#temporals.createNow(), 'EEEE, MMMM d, yyyy')}"></div>
        </div>
        
        <!-- Today's Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">💰 Today's Income</div>
                <div class="stat-value income" th:text="${#numbers.formatDecimal(entry.totalIncome, 1, 0)} + ' TZS'">0 TZS</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">💸 Today's Expense</div>
                <div class="stat-value expense" th:text="${#numbers.formatDecimal(entry.totalExpense, 1, 0)} + ' TZS'">0 TZS</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">📊 Today's Savings</div>
                <div class="stat-value" th:class="${(entry.totalIncome - entry.totalExpense) >= 0 ? 'income' : 'expense'}"
                     th:text="${#numbers.formatDecimal(entry.totalIncome - entry.totalExpense, 1, 0)} + ' TZS'">0 TZS</div>
            </div>
        </div>
        
        <!-- Add Expense Form -->
        <div class="section-card">
            <div class="form-title"><i class="fas fa-shopping-cart"></i> Add Expense</div>
            <form action="/excel/add-expense" method="post">
                <div class="row">
                    <div class="form-group">
                        <input type="text" name="description" placeholder="What did you buy?" required>
                    </div>
                    <div class="form-group">
                        <input type="number" step="0.01" name="amount" placeholder="Amount (TZS)" required>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <select name="category" required>
                            <option value="">Select Category</option>
                            <option value="Food">🍔 Food</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Rent">🏠 Rent</option>
                            <option value="Utilities">💡 Utilities</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Healthcare">🏥 Healthcare</option>
                            <option value="Education">📚 Education</option>
                            <option value="Other">📌 Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn-submit"><i class="fas fa-plus-circle"></i> Add Expense</button>
                    </div>
                </div>
            </form>
        </div>
        
        <!-- Add Income Form -->
        <div class="section-card">
            <div class="form-title"><i class="fas fa-money-bill-wave"></i> Add Income</div>
            <form action="/excel/add-income" method="post">
                <div class="row">
                    <div class="form-group">
                        <input type="text" name="description" placeholder="Income source" required>
                    </div>
                    <div class="form-group">
                        <input type="number" step="0.01" name="amount" min="0.01" placeholder="Amount (TZS)" required>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <select name="source" required>
                            <option value="">Select Source</option>
                            <option value="Salary">💰 Salary</option>
                            <option value="Business">💼 Business</option>
                            <option value="Investment">📈 Investment</option>
                            <option value="Gift">🎁 Gift</option>
                            <option value="Other">📌 Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn-submit"><i class="fas fa-plus-circle"></i> Add Income</button>
                    </div>
                </div>
            </form>
        </div>
        
        <!-- Excel Upload -->
        <div class="section-card">
            <div class="form-title"><i class="fas fa-file-excel"></i> Upload Excel File</div>
            <form action="/excel/upload" method="post" enctype="multipart/form-data">
                <div class="row">
                    <div class="form-group">
                        <input type="number" step="0.01" name="openingBalance" min="0.01" placeholder="Opening Balance (TZS)" required>
                    </div>
                    <div class="form-group">
                        <input type="file" name="file" accept=".xlsx, .xls" required>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <button type="submit" class="btn-submit" style="background: #217346;"><i class="fas fa-upload"></i> Upload Excel</button>
                    </div>
                    <div class="form-group">
                        <a href="/excel/download-template" class="btn-submit" style="background: #217346; display: block; text-align: center; text-decoration: none;">
                            <i class="fas fa-download"></i> Download Template
                        </a>
                    </div>
                </div>
            </form>
        </div>
        
        <!-- Today's Expenses List -->
        <div class="entry-list">
            <div class="form-title"><i class="fas fa-list"></i> Today's Expenses</div>
            <div th:if="${entry.expenses.empty}" class="empty-state" style="padding: 1rem;">
                <p>No expenses recorded today</p>
            </div>
            <div th:each="exp, stat : ${entry.expenses}" class="entry-item">
                <div>
                    <strong th:text="${exp.description}"></strong><br>
                    <small class="category-badge" th:text="${exp.category}"></small>
                </div>
                <div>
                    <span class="expense" th:text="'- ' + ${#numbers.formatDecimal(exp.amount, 1, 0)} + ' TZS'"></span>
                    <a th:href="'/excel/delete-expense/' + ${stat.index}" class="delete-btn" onclick="return confirm('Delete this expense?')">
                        <i class="fas fa-trash"></i>
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Today's Income List -->
        <div class="entry-list">
            <div class="form-title"><i class="fas fa-list"></i> Today's Income</div>
            <div th:if="${entry.incomes.empty}" class="empty-state" style="padding: 1rem;">
                <p>No income recorded today</p>
            </div>
            <div th:each="inc, stat : ${entry.incomes}" class="entry-item">
                <div>
                    <strong th:text="${inc.description}"></strong><br>
                    <small class="category-badge" th:text="${inc.source}"></small>
                </div>
                <div>
                    <span class="income" th:text="'+ ' + ${#numbers.formatDecimal(inc.amount, 1, 0)} + ' TZS'"></span>
                    <a th:href="'/excel/delete-income/' + ${stat.index}" class="delete-btn" onclick="return confirm('Delete this income?')">
                        <i class="fas fa-trash"></i>
                    </a>
                </div>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 1rem;">
            <a href="/excel/history" class="btn btn-secondary" style="display: inline-block; width: auto; padding: 0.75rem 2rem;">
                <i class="fas fa-history"></i> View History
            </a>
        </div>
    </div>
</body>
</html>
