<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Entry History - Finance Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #2F6B3F;
            --sidebar-width: 280px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #FFF6C0; }
        
        .sidebar {
            position: fixed; left: 0; top: 0; width: var(--sidebar-width); height: 100vh;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #1a4d2a 100%);
            color: white; padding: 1.5rem; overflow-y: auto;
        }
        .sidebar-header { text-align: center; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 1.5rem; }
        .sidebar-header h2 span { color: #F7C85C; }
        .nav-menu { list-style: none; }
        .nav-item { margin-bottom: 0.5rem; }
        .nav-link { display: flex; align-items: center; padding: 0.75rem 1rem; color: white; text-decoration: none; border-radius: 10px; gap: 12px; transition: all 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .nav-link.active { background: #F7C85C; color: var(--primary-dark); font-weight: bold; }
        
        .main-content { margin-left: var(--sidebar-width); padding: 1.5rem; min-height: 100vh; }
        .top-bar {
            background: white; border-radius: 15px; padding: 1rem 1.5rem; margin-bottom: 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logout-btn { background: #EF4444; color: white; padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; }
        
        .section-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
        }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #E5E7EB; }
        .data-table th { background: #F9FAFB; font-weight: 600; }
        .income { color: #10B981; }
        .expense { color: #EF4444; }
        .btn-delete { color: #EF4444; text-decoration: none; }
        .btn-back {
            background: #6B7280;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 1rem;
        }
        
        .mobile-menu-btn { display: none; position: fixed; top: 1rem; left: 1rem; z-index: 1100; background: var(--primary-dark); color: white; padding: 0.5rem; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-menu-btn { display: block; }
        }
    </style>
</head>
<body>
    <div class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h2>💰 Finance<span>Tracker</span></h2><p>Manage Your Finances</p></div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li class="nav-item"><a href="/transactions" class="nav-link"><i class="fas fa-exchange-alt"></i> Transactions</a></li>
            <li class="nav-item"><a href="/debts" class="nav-link"><i class="fas fa-hand-holding-usd"></i> Debts</a></li>
            <li class="nav-item"><a href="/investments" class="nav-link"><i class="fas fa-chart-line"></i> Investments</a></li>
            <li class="nav-item"><a href="/goals" class="nav-link"><i class="fas fa-bullseye"></i> Goals</a></li>
            <li class="nav-item"><a href="/budget" class="nav-link"><i class="fas fa-wallet"></i> Budget</a></li>
            <li class="nav-item"><a href="/excel/daily" class="nav-link active"><i class="fas fa-file-excel"></i> Daily Entry</a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="top-bar">
            <div><h3>📅 Daily Entry History</h3></div>
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
        
        <a href="/excel/daily" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Today</a>
        
        <div class="section-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Income</th>
                        <th>Expense</th>
                        <th>Savings</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="entry : ${history}">
                        <td th:text="${#temporals.format(entry.date, 'yyyy-MM-dd')}">Date</td>
                        <td class="income" th:text="'+ ' + ${#numbers.formatDecimal(entry.totalIncome, 1, 2)} + ' TZS'">Income</td>
                        <td class="expense" th:text="'- ' + ${#numbers.formatDecimal(entry.totalExpense, 1, 2)} + ' TZS'">Expense</td>
                        <td th:text="${#numbers.formatDecimal(entry.totalIncome - entry.totalExpense, 1, 2)} + ' TZS'">Savings</td>
                        <td><a th:href="'/excel/delete/' + ${entry.id}" class="btn-delete" onclick="return confirm('Delete this entry?')"><i class="fas fa-trash"></i> Delete</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    </script>
</body>
</html>
