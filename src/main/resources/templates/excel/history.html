<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Daily Entry History</title>
</head>
<body>
    <div layout:fragment="content">
        <div style="margin-bottom: 1.5rem;">
            <a href="/excel/daily-entry" class="btn btn-secondary" style="display: inline-block;">
                <i class="fas fa-arrow-left"></i> Back to Today
            </a>
        </div>

        <div class="section-card">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Opening Balance</th>
                            <th>Income</th>
                            <th>Expense</th>
                            <th>Savings</th>
                            <th>Closing Balance</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="entry : ${history}">
                            <td th:text="${#temporals.format(entry.date, 'yyyy-MM-dd')}">Date</td>
                            <td th:text="${#numbers.formatDecimal(entry.openingBalance, 1, 0)} + ' TZS'">0 TZS</td>
                            <td class="positive" th:text="'+ ' + ${#numbers.formatDecimal(entry.totalIncome, 1, 0)} + ' TZS'">0 TZS</td>
                            <td class="negative" th:text="'- ' + ${#numbers.formatDecimal(entry.totalExpense, 1, 0)} + ' TZS'">0 TZS</td>
                            <td th:class="${entry.totalIncome - entry.totalExpense >= 0 ? 'positive' : 'negative'}"
                                th:text="${#numbers.formatDecimal(entry.totalIncome - entry.totalExpense, 1, 0)} + ' TZS'">0 TZS</td>
                            <td th:text="${#numbers.formatDecimal(entry.closingBalance, 1, 0)} + ' TZS'">0 TZS</td>
                            <td>
                                <a th:href="'/excel/delete/' + ${entry.id}" 
                                   class="btn-xs btn-delete" 
                                   onclick="confirmDeleteEntry(this, event)">
                                    <i class="fas fa-trash"></i> Delete
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${history == null or history.empty}">
                            <td colspan="7">
                                <div class="empty-state">
                                    <i class="fas fa-calendar-alt"></i>
                                    <p>No history entries found.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

<th:block layout:fragment="scripts">
<script>
    function confirmDeleteEntry(element, event) {
        event.preventDefault();
        showDeleteModal('Delete this entry? This will also delete associated transactions.', function() {
            window.location.href = element.href;
        });
    }
</script>
</th:block>
</body>
</html>
